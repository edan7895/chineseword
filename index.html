<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>汉字拆字大师 - 点击寻字</title>
    <style>
        :root {
            --bg: #fdf6ee;
            --card-bg: #fffef9;
            --primary: #c0392b;
            --gold: #d4a017;
            --text: #3e2f1c;
            --text-light: #6b5d4f;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 6px 20px rgba(0,0,0,0.1);
            --radius-md: 16px;
            --radius-lg: 22px;
            --font-serif: 'STKaiti','KaiTi','楷体','Noto Serif SC',serif;
            --font-sans: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:var(--font-sans); background:linear-gradient(160deg,#fdf6ee 0%,#f7efe0 30%,#faf3e6 60%,#fdf8f2 100%);
            min-height:100vh; display:flex; align-items:center; justify-content:center; padding:12px;
            -webkit-tap-highlight-color:transparent; user-select:none; touch-action:manipulation;
        }
        .app-container{
            width:100%; max-width:700px; background:var(--card-bg); border-radius:var(--radius-lg);
            box-shadow:0 12px 36px rgba(0,0,0,0.14); display:flex; flex-direction:column;
            border:1px solid rgba(180,150,110,0.15);
        }
        .top-bar{
            display:flex; align-items:center; justify-content:space-between; padding:14px 18px;
            background:#fffef9; border-bottom:1px solid rgba(180,150,110,0.18); flex-wrap:wrap; gap:10px;
        }
        .level-badge{background:var(--primary); color:#fff; border-radius:20px; padding:4px 12px; font-weight:700;}
        .timer{
            font-weight:700; background:#fef9f0; border-radius:20px; padding:5px 14px;
            border:1.5px solid rgba(180,150,110,0.25); min-width:80px; text-align:center;
        }
        .timer.warning{color:#e74c3c; border-color:#e74c3c; background:#fff5f5; animation:pulse 0.7s infinite;}
        @keyframes pulse{50%{transform:scale(1.06);}}
        .score-display{font-weight:700; color:var(--gold); background:#fffef7; border-radius:20px; padding:5px 13px; border:1.5px solid rgba(212,160,23,0.3);}
        .game-main{display:flex; flex-wrap:wrap; gap:16px; padding:18px; align-items:flex-start; justify-content:center;}
        .big-char-zone{flex:1 1 300px; min-width:240px; max-width:360px; display:flex; flex-direction:column; align-items:center; gap:10px;}
        .big-char-wrapper{
            position:relative; width:100%; aspect-ratio:1/1; max-width:340px; border-radius:var(--radius-md);
            overflow:hidden; box-shadow:var(--shadow-md); border:2px solid rgba(180,150,110,0.2); cursor:pointer;
        }
        .big-char-wrapper canvas{display:block; width:100%; height:100%;}
        .hint-text{font-size:0.85rem; color:var(--text-light);}
        .right-panel{flex:1 1 250px; min-width:200px; display:flex; flex-direction:column; gap:16px;}
        .found-section{
            background:#fefcf7; border-radius:var(--radius-md); padding:14px 16px;
            border:1.5px solid rgba(180,150,110,0.2); box-shadow:var(--shadow-sm);
        }
        .found-title{font-weight:700; color:var(--text-light); text-align:center; margin-bottom:10px;}
        .found-cells{display:flex; flex-wrap:wrap; gap:8px; justify-content:center;}
        .found-cell{
            width:46px; height:46px; border:2px dashed rgba(180,150,110,0.35); border-radius:8px;
            display:flex; align-items:center; justify-content:center; font-size:1.3rem;
            font-family:var(--font-serif); font-weight:700; color:#c9b896; background:#fefefb;
            transition:all 0.3s;
        }
        .found-cell.filled{
            border-color:var(--gold); border-style:solid; background:#fffef5; color:var(--text);
            animation:cell-pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes cell-pop{0%{transform:scale(0.3) rotateY(90deg);opacity:0;}50%{transform:scale(1.15);}}
        .progress-text{text-align:center; font-size:0.8rem; color:var(--text-light); margin-top:8px;}
        .bottom-bar{display:flex; gap:12px; padding:14px 18px; border-top:1px solid rgba(180,150,110,0.18); background:#fffef9; justify-content:center; flex-wrap:wrap;}
        .btn{padding:10px 18px; border-radius:25px; font-weight:700; border:none; cursor:pointer; font-size:0.9rem; transition:all 0.2s; background:#f5f0e8; color:var(--text);}
        .btn:hover{background:#ede5d8;}
        .btn-hint{background:#fff8e1; color:#b8860b; border:2px solid rgba(212,160,23,0.4);}
        .btn-hint:hover{background:#fff3cd;}
        .btn:disabled{opacity:0.45; pointer-events:none;}
        .ad-overlay,.lock-overlay,.result-overlay,.level-select-overlay{position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; display:flex; align-items:center; justify-content:center;}
        .modal{background:#fffef9; border-radius:var(--radius-lg); padding:28px 22px; text-align:center; max-width:400px; width:90%; box-shadow:0 20px 50px rgba(0,0,0,0.4);}
        .ad-countdown{font-size:2.8rem; font-weight:900; color:var(--primary);}
        .btn-close-ad{padding:10px 28px; border-radius:25px; background:#4caf50; color:#fff; cursor:pointer; opacity:0; pointer-events:none; transition:0.3s;}
        .btn-close-ad.visible{opacity:1; pointer-events:auto;}
        .toast{position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#3e2f1c; color:#fff; padding:10px 22px; border-radius:25px; z-index:1000; font-weight:700;}
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <span class="level-badge" id="levelBadge">第1关</span>
        <div class="timer" id="timerDisplay">⏱ 90秒</div>
        <div class="score-display" id="scoreDisplay">🪙 0</div>
    </div>
    <div class="game-main">
        <div class="big-char-zone">
            <div class="big-char-wrapper" id="bigCharWrapper">
                <canvas id="bigCharCanvas"></canvas>
            </div>
            <div class="hint-text">👆 点击大字上的笔画部件</div>
        </div>
        <div class="right-panel">
            <div class="found-section">
                <div class="found-title">📋 已找到的隐藏字</div>
                <div class="found-cells" id="foundCells"></div>
                <div class="progress-text" id="progressText">0 / 0</div>
            </div>
        </div>
    </div>
    <div class="bottom-bar">
        <button class="btn btn-hint" id="btnHint">💡 提示</button>
        <button class="btn" id="btnLevels">📂 关卡选择</button>
    </div>
</div>

<div class="ad-overlay" id="adOverlay" style="display:none;">
    <div class="modal">
        <div style="font-size:3rem;">📺</div>
        <div class="ad-countdown" id="adCountdown">5</div>
        <button class="btn-close-ad" id="btnCloseAd">✓ 关闭广告</button>
    </div>
</div>
<div class="lock-overlay" id="lockOverlay" style="display:none;">
    <div class="modal">
        <div style="font-size:3rem;">🔒</div>
        <h2>关卡已锁定</h2>
        <div class="ad-countdown" id="lockCountdown">02:00</div>
        <button class="btn" id="btnUnlockAd">📺 看广告立即解锁</button>
    </div>
</div>
<div class="result-overlay" id="resultOverlay" style="display:none;">
    <div class="modal" id="resultModal"></div>
</div>
<div class="level-select-overlay" id="levelSelectOverlay" style="display:none;">
    <div class="modal" style="max-height:80vh; overflow-y:auto;">
        <h3>📂 选择关卡</h3>
        <div id="levelGrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(60px,1fr)); gap:8px;"></div>
        <button class="btn" id="btnCloseLevelSelect" style="margin-top:16px;">关闭</button>
    </div>
</div>

<script src="level.js"></script>
<script>
(function() {
    if (typeof levelData === 'undefined') { alert('缺少 level.js'); return; }

    const $ = id => document.getElementById(id);
    const canvas = $('bigCharCanvas'), ctx = canvas.getContext('2d');
    const wrapper = $('bigCharWrapper');
    let currentLevelIndex = 0, totalScore = 0, foundSet = new Set();
    let timeLeft = 90, timerInterval, isGameActive = false, isPaused = false;
    let hintUsed = 0, reviveUsed = false, wrongAttempts = 0, lockUntil = null;
    let adCallback, adTimer;

    function getLevel() { return levelData[currentLevelIndex]; }
    function drawChar() {
        const rect = wrapper.getBoundingClientRect();
        if (rect.width === 0) return;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
        ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
        ctx.fillStyle = '#fffef9'; ctx.fillRect(0,0,rect.width,rect.height);
        const cx = rect.width/2, cy = rect.height/2;
        ctx.strokeStyle = 'rgba(180,150,110,0.4)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(rect.width*0.1, cy); ctx.lineTo(rect.width*0.9, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, rect.height*0.1); ctx.lineTo(cx, rect.height*0.9); ctx.stroke();
        const level = getLevel();
        const fontSize = Math.min(rect.width, rect.height) * 0.6;
        ctx.fillStyle = '#3e2f1c';
        ctx.font = `700 ${fontSize}px "STKaiti","KaiTi","楷体",serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(level.character, cx, cy);
    }

    function renderFoundCells() {
        const level = getLevel();
        const total = level.hiddenWords.length;
        $('foundCells').innerHTML = Array(total).fill('<div class="found-cell"></div>').join('');
        $('progressText').textContent = `0 / ${total}`;
        updateFoundDisplay();
    }
    function updateFoundDisplay() {
        const level = getLevel();
        const cells = document.querySelectorAll('.found-cell');
        const foundArr = Array.from(foundSet);
        cells.forEach((cell, i) => {
            if (i < foundArr.length) {
                cell.textContent = foundArr[i];
                cell.classList.add('filled');
            } else {
                cell.textContent = '';
                cell.classList.remove('filled');
            }
        });
        $('progressText').textContent = `${foundArr.length} / ${level.hiddenWords.length}`;
    }

    wrapper.addEventListener('click', (e) => {
        if (!isGameActive || isPaused || isLocked()) return;
        const rect = wrapper.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;
        const level = getLevel();
        for (let item of level.hiddenWords) {
            if (foundSet.has(item.word)) continue;
            const z = item.zone;
            if (x >= z.x && x <= z.x + z.w && y >= z.y && y <= z.y + z.h) {
                foundSet.add(item.word);
                updateFoundDisplay();
                totalScore += 10; $('scoreDisplay').textContent = '🪙 ' + totalScore;
                saveProgress();
                if (foundSet.size === level.hiddenWords.length) handleWin();
                return;
            }
        }
        wrongAttempts++;
        timeLeft = Math.max(0, timeLeft - 3);
        updateTimer();
        if (wrongAttempts >= 3 && !isLocked()) applyLock();
        showToast('❌ 未点中隐藏字，-3秒');
    });

    function isLocked() { return lockUntil && Date.now() < lockUntil; }
    function applyLock() {
        const penalty = [0,0,0,2,3,4,5][Math.min(wrongAttempts,6)] * 60;
        lockUntil = Date.now() + penalty * 1000;
        $('lockOverlay').style.display = 'flex';
        updateLockTimer();
        let lockTimer = setInterval(() => {
            if (!lockUntil || Date.now() >= lockUntil) {
                clearInterval(lockTimer);
                $('lockOverlay').style.display = 'none';
                lockUntil = null;
            } else updateLockTimer();
        }, 1000);
    }
    function updateLockTimer() {
        const remain = Math.ceil((lockUntil - Date.now()) / 1000);
        $('lockCountdown').textContent = `${Math.floor(remain/60)}:${String(remain%60).padStart(2,'0')}`;
    }
    $('btnUnlockAd').addEventListener('click', () => {
        showAd('解锁关卡', () => { wrongAttempts = 0; lockUntil = null; $('lockOverlay').style.display = 'none'; });
    });

    function showAd(title, cb) {
        adCallback = cb; $('adOverlay').style.display = 'flex';
        let count = 5; $('adCountdown').textContent = count;
        $('btnCloseAd').classList.remove('visible');
        adTimer = setInterval(() => {
            count--;
            $('adCountdown').textContent = count;
            if (count <= 0) {
                clearInterval(adTimer);
                $('btnCloseAd').classList.add('visible');
            }
        }, 1000);
    }
    $('btnCloseAd').addEventListener('click', () => {
        if (!$('btnCloseAd').classList.contains('visible')) return;
        clearInterval(adTimer);
        $('adOverlay').style.display = 'none';
        if (adCallback) { adCallback(); adCallback = null; }
    });

    $('btnHint').addEventListener('click', () => {
        if (!isGameActive || isPaused || isLocked()) return;
        const level = getLevel();
        const unfound = level.hiddenWords.filter(w => !foundSet.has(w.word));
        if (unfound.length === 0) return;
        if (hintUsed >= 2) { showToast('提示次数已用完'); return; }
        showAd('获得提示', () => {
            const pick = unfound[Math.floor(Math.random() * unfound.length)];
            foundSet.add(pick.word);
            updateFoundDisplay();
            totalScore += 5; $('scoreDisplay').textContent = '🪙 ' + totalScore;
            hintUsed++;
            if (foundSet.size === level.hiddenWords.length) handleWin();
        });
    });

    function handleWin() {
        clearInterval(timerInterval); isGameActive = false;
        totalScore += 100; $('scoreDisplay').textContent = '🪙 ' + totalScore;
        completedLevels.add(currentLevelIndex); saveProgress();
        $('resultModal').innerHTML = `
            <div style="font-size:3rem;">🎉</div><h2>通关！</h2>
            <button class="btn" id="btnNext">下一关</button>
            <button class="btn" id="btnRetry">重玩</button>
        `;
        $('resultOverlay').style.display = 'flex';
        $('btnNext').addEventListener('click', () => {
            $('resultOverlay').style.display = 'none';
            loadLevel(currentLevelIndex + 1);
        });
        $('btnRetry').addEventListener('click', () => { $('resultOverlay').style.display = 'none'; loadLevel(currentLevelIndex); });
    }

    function updateTimer() {
        const m = Math.floor(timeLeft/60), s = timeLeft%60;
        $('timerDisplay').textContent = `⏱ ${m}:${String(s).padStart(2,'0')}`;
        if (timeLeft <= 15) $('timerDisplay').classList.add('warning');
        else $('timerDisplay').classList.remove('warning');
    }
    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isPaused || isLocked()) return;
            timeLeft--;
            updateTimer();
            if (timeLeft <= 0) { clearInterval(timerInterval); isGameActive = false; showLose(); }
        }, 1000);
    }

    function loadLevel(idx) {
        if (idx < 0 || idx >= levelData.length) idx = 0;
        currentLevelIndex = idx;
        foundSet.clear(); timeLeft = 90; isGameActive = true; isPaused = false;
        hintUsed = 0; reviveUsed = false; wrongAttempts = 0; lockUntil = null;
        $('levelBadge').textContent = `第${getLevel().id}关`;
        renderFoundCells();
        drawChar();
        startTimer();
        $('scoreDisplay').textContent = '🪙 ' + totalScore;
        saveProgress();
    }

    function showToast(msg) {
        const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    let completedLevels = new Set();
    function saveProgress() {
        localStorage.setItem('hanzi_click', JSON.stringify({
            totalScore, currentLevelIndex, completedLevels: [...completedLevels]
        }));
    }
    function loadProgress() {
        const d = JSON.parse(localStorage.getItem('hanzi_click') || '{}');
        totalScore = d.totalScore || 0;
        currentLevelIndex = d.currentLevelIndex || 0;
        completedLevels = new Set(d.completedLevels || []);
    }

    window.addEventListener('resize', () => { if (isGameActive) drawChar(); });

    $('btnLevels').addEventListener('click', () => {
        $('levelSelectOverlay').style.display = 'flex';
        const grid = $('levelGrid');
        grid.innerHTML = '';
        levelData.forEach((lv, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = lv.id;
            if (completedLevels.has(i)) btn.style.background = '#c8e6c9';
            btn.addEventListener('click', () => {
                $('levelSelectOverlay').style.display = 'none';
                loadLevel(i);
            });
            grid.appendChild(btn);
        });
    });
    $('btnCloseLevelSelect').addEventListener('click', () => $('levelSelectOverlay').style.display = 'none');

    loadProgress();
    loadLevel(currentLevelIndex);
})();
</script>
</body>
</html>
