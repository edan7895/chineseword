<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>汉字拆字大师 - 寻字解谜</title>
    <link rel="icon" href="data:,">
    <!-- CrazyGames SDK -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
        :root {
            --bg: #fdf6ee;
            --card-bg: #fffef9;
            --primary: #c0392b;
            --primary-light: #e74c3c;
            --gold: #d4a017;
            --gold-light: #f0c75e;
            --text: #3e2f1c;
            --text-light: #6b5d4f;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 6px 20px rgba(0,0,0,0.10);
            --shadow-lg: 0 12px 36px rgba(0,0,0,0.14);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --font-serif: 'STKaiti','KaiTi','楷体','Noto Serif SC','Songti SC','宋体',serif;
            --font-sans: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','微软雅黑',sans-serif;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
            --cell-size: 48px;
            --cell-size-mobile: 40px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-sans);
            background: linear-gradient(160deg, #fdf6ee 0%, #f7efe0 30%, #faf3e6 60%, #fdf8f2 100%);
            background-attachment: fixed;
            min-height: 100vh; min-height: 100dvh; color: var(--text);
            display: flex; align-items: center; justify-content: center; padding: 12px;
            -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation;
        }
        .app-container {
            width: 100%; max-width: 820px; background: var(--card-bg); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg); overflow: hidden; display: flex; flex-direction: column;
            border: 1px solid rgba(180,150,110,0.15);
        }
        .top-bar {
            display: flex; align-items: center; justify-content: space-between; padding: 14px 18px;
            background: linear-gradient(180deg, #fffef9 0%, #fdf8f0 100%);
            border-bottom: 1px solid rgba(180,150,110,0.18); flex-wrap: wrap; gap: 10px; z-index: 5;
        }
        .level-info { display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .level-badge { background: var(--primary); color:#fff; border-radius:20px; padding:4px 12px; font-size:0.85rem; font-weight:700; }
        .timer {
            font-weight: 700; background: #fef9f0; border-radius: 20px; padding: 5px 14px;
            border: 1.5px solid rgba(180,150,110,0.25); min-width: 80px; text-align: center;
        }
        .timer.warning { color:#e74c3c; border-color:#e74c3c; background:#fff5f5; animation: pulse-warning 0.7s infinite; }
        @keyframes pulse-warning { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
        .score-display {
            font-weight: 700; color: var(--gold); background: #fffef7; border-radius: 20px;
            padding: 5px 13px; border: 1.5px solid rgba(212,160,23,0.3);
        }
        .lives-display {
            display: flex; align-items: center; gap: 4px; font-weight: 700; font-size: 0.95rem;
            color: #e74c3c; background: #fff5f5; border-radius: 20px; padding: 5px 13px;
            border: 1.5px solid rgba(231,76,60,0.3);
        }
        .lives-display .heart { font-size: 1.1rem; }
        .recovery-timer { margin-left: 6px; font-size: 0.8rem; color: #e67e22; }

        .game-main {
            display: flex; flex-wrap: wrap; gap: 16px; padding: 18px; align-items: flex-start; justify-content: center;
        }
        .big-char-zone { flex: 1 1 240px; min-width: 200px; max-width: 340px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .big-char-wrapper {
            position: relative; width: 100%; aspect-ratio: 1/1; max-width: 320px; max-height: 320px;
            cursor: pointer; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md);
            background: #fffef9; border: 2px solid rgba(180,150,110,0.2);
        }
        .big-char-wrapper canvas { display: block; width: 100%; height: 100%; border-radius: var(--radius-md); }
        .big-char-label { font-size: 0.85rem; color: var(--text-light); }
        .ripple {
            position: absolute; border-radius: 50%; background: rgba(212,160,23,0.45);
            transform: scale(0); animation: ripple-anim 0.7s ease-out forwards; pointer-events: none; z-index: 2;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        .right-panel { flex: 1 1 280px; min-width: 240px; display: flex; flex-direction: column; gap: 16px; }
        .found-grid-section {
            background: #fefcf7; border-radius: var(--radius-md); padding: 14px 16px;
            border: 1.5px solid rgba(180,150,110,0.2); box-shadow: var(--shadow-sm);
        }
        .found-grid-title { font-size: 0.85rem; font-weight: 700; color: var(--text-light); text-align: center; margin-bottom: 10px; }
        .found-cells { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .found-cell {
            width: var(--cell-size); height: var(--cell-size); border: 2px dashed rgba(180,150,110,0.35);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-family: var(--font-serif); font-weight: 700; color: #c9b896; background: #fefefb;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .found-cell.filled {
            border-color: var(--gold); border-style: solid; background: #fffef5; color: var(--text);
            animation: cell-pop 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes cell-pop { 0%{transform:scale(0.3) rotateY(90deg);opacity:0;} 50%{transform:scale(1.15);} }
        .progress-mini { text-align: center; font-size: 0.8rem; color: var(--text-light); margin-top: 8px; }

        .candidate-section {
            background: #fefcf7; border-radius: var(--radius-md); padding: 14px 16px;
            border: 1.5px solid rgba(180,150,110,0.2); box-shadow: var(--shadow-sm);
        }
        .candidate-title { font-size: 0.85rem; font-weight: 700; color: var(--text-light); text-align: center; margin-bottom: 10px; }
        .candidate-chips { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; }
        .candidate-chip {
            display: inline-flex; align-items: center; justify-content: center; min-width: 46px; height: 46px;
            padding: 6px 14px; border-radius: 23px; font-size: 1.1rem; font-family: var(--font-serif);
            font-weight: 700; cursor: pointer; transition: all var(--transition); background: #fffef9;
            border: 2px solid rgba(180,150,110,0.3); color: var(--text);
        }
        .candidate-chip:hover { border-color: var(--gold); background: #fffef3; box-shadow: 0 4px 14px rgba(212,160,23,0.2); transform: translateY(-2px); }
        .candidate-chip:active { transform: scale(0.93); }
        .candidate-chip.found {
            background: #e8f5e9; border-color: #4caf50; color: #2e7d32; pointer-events: none; opacity: 0.7;
            text-decoration: line-through; text-decoration-thickness: 2px; text-decoration-color: #4caf50;
        }
        .candidate-chip.wrong-flash { animation: shake 0.5s ease; background: #fff0f0; border-color: #e74c3c; color: #c0392b; }
        @keyframes shake {
            0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);}
            60%{transform:translateX(-5px);} 80%{transform:translateX(4px);}
        }

        .bottom-bar {
            display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px 18px;
            border-top: 1px solid rgba(180,150,110,0.18); flex-wrap: wrap; background: #fffef9;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 25px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer; border: none; transition: all var(--transition);
            font-family: var(--font-sans); white-space: nowrap;
        }
        .btn-hint { background: #fff8e1; color: #b8860b; border: 2px solid rgba(212,160,23,0.4); }
        .btn-hint:hover { background: #fff3cd; border-color: var(--gold); }
        .btn-levels { background: #f5f0e8; color: var(--text); border: 2px solid rgba(180,150,110,0.3); }
        .btn-levels:hover { background: #ede5d8; }
        .btn-revive {
            background: linear-gradient(135deg, #ff6b6b, #e74c3c); color: #fff;
            box-shadow: 0 4px 14px rgba(231,76,60,0.35);
        }
        .btn-revive:hover { background: #c0392b; }
        .btn-daily { background: #e8f5e9; color: #2e7d32; border: 2px solid #4caf50; }
        .btn-daily:hover { background: #c8e6c9; }
        .btn:disabled { opacity: 0.45; pointer-events: none; cursor: not-allowed; }

        /* 广告遮罩（仅在模拟广告时使用） */
        .ad-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.82); z-index: 999;
            display: flex; align-items: center; justify-content: center; animation: fade-in 0.3s ease;
        }
        .ad-modal {
            background: #fffef9; border-radius: var(--radius-lg); padding: 28px 24px; text-align: center;
            max-width: 400px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            animation: pop-in 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .ad-modal .ad-icon { font-size: 3rem; margin-bottom: 8px; }
        .ad-modal .ad-title { font-weight: 700; font-size: 1.2rem; color: var(--text); margin-bottom: 6px; }
        .ad-modal .ad-subtitle { font-size: 0.85rem; color: var(--text-light); margin-bottom: 16px; }
        .ad-modal .ad-countdown { font-size: 2.8rem; font-weight: 900; color: var(--primary); margin: 10px 0; }
        .ad-modal .ad-progress-bar { width: 100%; height: 6px; background: #e8e0d5; border-radius: 3px; overflow: hidden; margin: 10px 0 16px; }
        .ad-modal .ad-progress-fill { height: 100%; background: linear-gradient(90deg, #e74c3c, #f39c12); border-radius: 3px; transition: width 0.95s linear; }
        .ad-modal .btn-close-ad {
            display: inline-block; padding: 10px 28px; border-radius: 25px; font-weight: 700; font-size: 0.95rem;
            cursor: pointer; background: #4caf50; color: #fff; opacity: 0; pointer-events: none; transform: translateY(8px);
            transition: all 0.35s;
        }
        .ad-modal .btn-close-ad.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .ad-modal .btn-close-ad:hover { background: #388e3c; }

        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 998;
            display: flex; align-items: center; justify-content: center; animation: fade-in 0.3s ease;
        }
        .result-modal {
            background: #fffef9; border-radius: var(--radius-lg); padding: 28px 22px; text-align: center; max-width: 420px; width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); animation: pop-in 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .result-modal .result-icon { font-size: 4rem; margin-bottom: 6px; }
        .result-modal .result-title { font-weight: 900; font-size: 1.5rem; margin-bottom: 4px; }
        .result-modal .result-subtitle { font-size: 0.9rem; color: var(--text-light); margin-bottom: 14px; }
        .result-modal .result-score { font-size: 1.1rem; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
        .result-modal .result-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .btn-result { padding: 11px 22px; border-radius: 25px; font-weight: 700; font-size: 0.9rem; cursor: pointer; border: none; }
        .btn-next { background: #4caf50; color: #fff; }
        .btn-next:hover { background: #388e3c; }
        .btn-retry { background: #ff9800; color: #fff; }
        .btn-retry:hover { background: #f57c00; }
        .btn-quit { background: #f5f0e8; color: var(--text); border: 2px solid rgba(180,150,110,0.3); }
        .btn-quit:hover { background: #ede5d8; }

        .level-select-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:997;
            display:flex; align-items:center; justify-content:center; animation: fade-in 0.3s ease;
        }
        .level-select-modal {
            background:#fffef9; border-radius:var(--radius-lg); padding:20px 16px; max-width:500px; width:92%; max-height:80vh; overflow-y:auto;
        }
        .level-select-modal h3 { text-align:center; font-size:1.3rem; font-weight:900; margin-bottom:14px; }
        .level-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(64px,1fr)); gap:10px; }
        .level-cell {
            aspect-ratio:1/1; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center;
            cursor:pointer; font-weight:700; font-size:0.85rem; transition:all var(--transition);
            border:2px solid rgba(180,150,110,0.25); background:#fffef9; position:relative; font-family:var(--font-serif);
        }
        .level-cell:hover { border-color:var(--gold); box-shadow:0 4px 14px rgba(212,160,23,0.2); transform:translateY(-3px); }
        .level-cell.completed { background:#e8f5e9; border-color:#4caf50; color:#2e7d32; }
        .level-cell.completed::after { content:'✓'; position:absolute; top:4px; right:8px; font-size:0.7rem; color:#4caf50; font-weight:900; }
        .level-cell.current { border-color:var(--primary); border-width:3px; box-shadow:0 0 0 4px rgba(192,57,43,0.12); background:#fff5f5; }
        .level-cell.locked { opacity:0.4; pointer-events:none; background:#f5f0ea; color:#c5b8a5; }
        .level-cell .level-num { font-size:0.7rem; color:var(--text-light); }
        .level-cell .level-char { font-size:1.4rem; line-height:1; }
        .level-cell .level-stars { font-size:0.55rem; letter-spacing:-1px; }
        .close-level-select { display:block; margin:16px auto 0; padding:10px 28px; border-radius:25px; font-weight:700; cursor:pointer; background:#f5f0e8; color:var(--text); border:none; }

        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#3e2f1c; color:#fff;
            padding:10px 22px; border-radius:25px; font-weight:700; font-size:0.9rem; z-index:1000;
            pointer-events:none; animation:toast-in 0.4s ease, toast-out 0.4s ease 1.6s forwards;
        }
        @keyframes toast-in { from{opacity:0;transform:translateX(-50%) translateY(-30px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes toast-out { from{opacity:1;transform:translateX(-50%) translateY(0);} to{opacity:0;transform:translateX(-50%) translateY(-30px);} }

        @media (max-width: 600px) {
            .game-main { flex-direction: column; align-items: center; gap:12px; padding:12px; }
            .big-char-zone { max-width:260px; flex:none; }
            .big-char-wrapper { max-width:260px; max-height:260px; }
            .right-panel { width:100%; flex:none; }
            .found-cell { width:var(--cell-size-mobile); height:var(--cell-size-mobile); font-size:1.1rem; }
            .candidate-chip { min-width:38px; height:40px; padding:5px 10px; font-size:0.95rem; border-radius:20px; }
            .top-bar { padding:10px 12px; gap:6px; font-size:0.85rem; }
            .timer { font-size:0.95rem; padding:4px 10px; min-width:60px; }
            .btn { padding:8px 14px; font-size:0.8rem; }
            .bottom-bar { gap:8px; padding:10px 12px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <div class="level-info">
                <span class="level-badge" id="levelBadge">第1关</span>
                <span id="levelTitle">★</span>
            </div>
            <div class="lives-display" id="livesDisplay">
                <span class="heart">❤️</span> <span id="livesCount">3</span>
                <span class="recovery-timer" id="recoveryTimer"></span>
            </div>
            <div class="timer" id="timerDisplay">⏱ 90秒</div>
            <div class="score-display">
                <span class="coin-icon">🪙</span> <span id="scoreDisplay">0</span>
            </div>
        </div>

        <div class="game-main">
            <div class="big-char-zone">
                <div class="big-char-wrapper" id="bigCharWrapper">
                    <canvas id="bigCharCanvas"></canvas>
                </div>
                <div class="big-char-label">👆 点击大字观察结构</div>
            </div>
            <div class="right-panel">
                <div class="found-grid-section">
                    <div class="found-grid-title">📋 已找到的隐藏字</div>
                    <div class="found-cells" id="foundCells"></div>
                    <div class="progress-mini" id="progressMini">0 / 0</div>
                </div>
                <div class="candidate-section">
                    <div class="candidate-title">🔍 候选字（点击选择）</div>
                    <div class="candidate-chips" id="candidateChips"></div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="btn btn-hint" id="btnHint">💡 Hint（提示）</button>
            <button class="btn btn-revive" id="btnRevive" style="display:none;">❤️ Revive（续命）</button>
            <button class="btn btn-daily" id="btnDaily">📅 Daily（每日挑战）</button>
            <button class="btn btn-levels" id="btnLevels">📂 Levels（关卡）</button>
        </div>
    </div>

    <!-- 模拟广告遮罩（仅作降级备用） -->
    <div class="ad-overlay" id="adOverlay" style="display:none;">
        <div class="ad-modal">
            <div class="ad-icon">📺</div>
            <div class="ad-title" id="adTitle">广告播放中...</div>
            <div class="ad-subtitle" id="adSubtitle">请观看广告以获取奖励</div>
            <div class="ad-countdown" id="adCountdown">5</div>
            <div class="ad-progress-bar">
                <div class="ad-progress-fill" id="adProgressFill" style="width:0%;"></div>
            </div>
            <button class="btn-close-ad" id="btnCloseAd">✓ 关闭广告</button>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="result-overlay" id="resultOverlay" style="display:none;">
        <div class="result-modal" id="resultModal"></div>
    </div>

    <!-- 关卡选择 -->
    <div class="level-select-overlay" id="levelSelectOverlay" style="display:none;">
        <div class="level-select-modal">
            <h3>📂 选择关卡</h3>
            <div class="level-grid" id="levelGrid"></div>
            <button class="close-level-select" id="btnCloseLevelSelect">关闭</button>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="level.js"></script>
    <script>
        (function() {
            if (typeof levelData === 'undefined') {
                alert('关卡数据加载失败，请检查 level.js 文件是否存在。');
                return;
            }

            // ==================== 汉字释义库 ====================
            const charDescriptions = {
                '大': '像一个张开双臂的人，表示大小的大。',
                '天': '人头顶上方的天空，本义为头顶。',
                '太': '大字下面加一点，表示过于、极。',
                '木': '一棵树的样子，上为枝叶，下为根。',
                '人': '侧面站立的人形。',
                '从': '两人一前一后，表示跟从。',
                '众': '三人为众，表示人多。',
                '火': '火焰的形状。',
                '灭': '火上加一横，表示用东西盖住火，即为灭。',
                '口': '像一张嘴。',
                '日': '太阳的形状。',
                '月': '像一弯新月。',
                '明': '日月组合，表示明亮。',
                '林': '两棵树并排，表示树林。',
                '森': '三木为森，表示森林。',
                '休': '人靠在树旁休息。',
                '好': '女子相伴，表示美好。',
            };

            // ==================== 游戏状态 ====================
            let currentLevelIndex = 0;
            let totalScore = 0;
            let foundSet = new Set();
            let timeLeft = 90;
            const TOTAL_TIME = 90;
            const BONUS_TIME = 30;
            let timerInterval = null;
            let isGameActive = false;
            let isPaused = false;
            let hintUsedCount = 0;
            const MAX_HINTS = 2;
            let doubleHintCount = 0;
            let reviveUsed = false;
            let adCallback = null;
            let adCountdownTimer = null;
            let completedLevels = new Set();

            // 生命值系统
            let lives = 3;
            const MAX_LIVES = 3;
            const RECOVERY_INTERVAL = 5 * 60 * 1000;
            let lastRecoveryTime = Date.now();
            let recoveryTimerInterval = null;

            // ==================== DOM 元素 ====================
            const $ = (sel) => document.querySelector(sel);
            const bigCharWrapper = $('#bigCharWrapper');
            const bigCharCanvas = $('#bigCharCanvas');
            const ctx = bigCharCanvas.getContext('2d');
            const foundCells = $('#foundCells');
            const candidateChips = $('#candidateChips');
            const progressMini = $('#progressMini');
            const timerDisplay = $('#timerDisplay');
            const scoreDisplay = $('#scoreDisplay');
            const levelBadge = $('#levelBadge');
            const levelTitle = $('#levelTitle');
            const btnHint = $('#btnHint');
            const btnRevive = $('#btnRevive');
            const btnDaily = $('#btnDaily');
            const btnLevels = $('#btnLevels');
            const adOverlay = $('#adOverlay');
            const adTitle = $('#adTitle');
            const adSubtitle = $('#adSubtitle');
            const adCountdown = $('#adCountdown');
            const adProgressFill = $('#adProgressFill');
            const btnCloseAd = $('#btnCloseAd');
            const resultOverlay = $('#resultOverlay');
            const resultModal = $('#resultModal');
            const levelSelectOverlay = $('#levelSelectOverlay');
            const levelGrid = $('#levelGrid');
            const btnCloseLevelSelect = $('#btnCloseLevelSelect');
            const toastContainer = $('#toastContainer');
            const livesCount = $('#livesCount');
            const recoveryTimer = $('#recoveryTimer');

            // ==================== 音效 ====================
            let audioCtx = null;
            function getAudioCtx() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} return audioCtx; }
            function playBeep(freq, duration, type='sine', vol=0.15) {
                const ctx = getAudioCtx(); if(!ctx) return;
                try {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.type = type; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(vol, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
                } catch(e) {}
            }
            function sfxCorrect() { playBeep(880,0.12); playBeep(1100,0.1); }
            function sfxWrong() { playBeep(180,0.25,'triangle',0.2); }
            function sfxWin() { playBeep(660,0.12); setTimeout(()=>playBeep(880,0.12),120); setTimeout(()=>playBeep(1100,0.18),240); }
            function sfxTick() { playBeep(440,0.06,'square',0.08); }

            // ==================== Toast 通知 ====================
            function showToast(msg, duration=2000) {
                const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
                toastContainer.appendChild(el);
                setTimeout(()=>{ if(el.parentNode) el.remove(); }, duration+500);
            }

            // ==================== 持久化存储 ====================
            function saveProgress() {
                try {
                    const data = { totalScore, completedLevels: Array.from(completedLevels), currentLevelIndex, lives, lastRecoveryTime, doubleHintCount };
                    localStorage.setItem('hanzi_game_progress', JSON.stringify(data));
                } catch(e) {}
            }
            function loadProgress() {
                try {
                    const raw = localStorage.getItem('hanzi_game_progress');
                    if (raw) {
                        const data = JSON.parse(raw);
                        totalScore = data.totalScore || 0;
                        completedLevels = new Set(data.completedLevels || []);
                        currentLevelIndex = data.currentLevelIndex || 0;
                        lives = data.lives != null ? data.lives : 3;
                        lastRecoveryTime = data.lastRecoveryTime || Date.now();
                        doubleHintCount = data.doubleHintCount || 0;
                        if (currentLevelIndex >= levelData.length) currentLevelIndex = levelData.length - 1;
                        if (currentLevelIndex < 0) currentLevelIndex = 0;
                    }
                } catch(e) {}

            // ==================== 生命值与恢复倒计时 ====================
            function updateLivesAndRecoveryDisplay() {
                livesCount.textContent = lives;
                btnRevive.style.display = (lives < MAX_LIVES) ? 'inline-flex' : 'none';
                const now = Date.now();
                const nextRecovery = lastRecoveryTime + RECOVERY_INTERVAL;
                const remaining = Math.max(0, Math.ceil((nextRecovery - now) / 1000));
                if (lives >= MAX_LIVES) {
                    recoveryTimer.textContent = '';
                    return;
                }
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                recoveryTimer.textContent = `恢复 ${mins}:${secs.toString().padStart(2,'0')}`;
                if (remaining <= 0) {
                    lives = Math.min(lives + 1, MAX_LIVES);
                    lastRecoveryTime = now;
                    showToast('❤️ 自动恢复1条命', 2000);
                    saveProgress();
                    updateLivesAndRecoveryDisplay();
                }
            }
            function resetRecoveryTimer() {
                lastRecoveryTime = Date.now();
                updateLivesAndRecoveryDisplay();
                saveProgress();
            }
            function startRecoveryTimer() {
                if (recoveryTimerInterval) clearInterval(recoveryTimerInterval);
                recoveryTimerInterval = setInterval(updateLivesAndRecoveryDisplay, 500);
            }
            function loseLife() {
                if (lives > 0) {
                    lives--;
                    if (lives < MAX_LIVES) resetRecoveryTimer();
                    updateLivesAndRecoveryDisplay();
                    saveProgress();
                    if (lives === 0) showToast('💔 生命耗尽！看广告续命或等待5分钟恢复', 3000);
                }
            }
            function reviveLife() {
                if (lives >= MAX_LIVES) return;
                showAd('📺 观看广告续命', '广告结束后将恢复1条命', () => {
                    lives = Math.min(lives + 1, MAX_LIVES);
                    resetRecoveryTimer();
                    updateLivesAndRecoveryDisplay();
                    saveProgress();
                    showToast('❤️ +1条命！', 1500);
                });
            }

            // ==================== Canvas 绘制 ====================
            function drawBigChar(character) {
                const rect = bigCharWrapper.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                const w = rect.width, h = rect.height;
                if (w<=0||h<=0) return;
                bigCharCanvas.width = w*dpr; bigCharCanvas.height = h*dpr;
                bigCharCanvas.style.width = w+'px'; bigCharCanvas.style.height = h+'px';
                ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
                ctx.fillStyle='#fffef9'; ctx.fillRect(0,0,w,h);
                const cx=w/2, cy=h/2, margin=w*0.12;
                ctx.strokeStyle='rgba(180,150,110,0.35)'; ctx.lineWidth=1.2;
                ctx.setLineDash([6,4]);
                ctx.beginPath(); ctx.moveTo(margin,cy); ctx.lineTo(w-margin,cy); ctx.moveTo(cx,margin); ctx.lineTo(cx,h-margin); ctx.stroke();
                ctx.setLineDash([]);
                ctx.strokeStyle='rgba(180,150,110,0.55)'; ctx.lineWidth=2.5; ctx.strokeRect(margin,margin,w-2*margin,h-2*margin);
                const fontSize = Math.min(w,h)*0.58;
                ctx.fillStyle='#3e2f1c'; ctx.font=`700 ${fontSize}px "STKaiti","KaiTi","楷体","Noto Serif SC","Songti SC","宋体",serif`;
                ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText(character, cx, cy);
                ctx.fillStyle='rgba(0,0,0,0.04)'; ctx.fillText(character, cx+1.5, cy+2);
                ctx.fillStyle='#3e2f1c'; ctx.fillText(character, cx, cy);
            }
            function redrawCanvas() { const level = levelData[currentLevelIndex]; if(level) drawBigChar(level.character); }

            // ==================== 游戏核心逻辑 ====================
            function getCurrentLevel() { return levelData[currentLevelIndex]; }
            function shuffleArray(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
            function buildCandidateList() {
                const level = getCurrentLevel();
                return shuffleArray([...new Set([...level.hiddenWords, ...level.distractors])]);
            }

            function renderFoundCells() {
                const level = getCurrentLevel();
                foundCells.innerHTML = '';
                for(let i=0; i<level.hiddenWords.length; i++) {
                    const cell = document.createElement('div'); cell.className='found-cell'; foundCells.appendChild(cell);
                }
                updateFoundCellsDisplay();
                progressMini.textContent = `0 / ${level.hiddenWords.length}`;
            }
            function updateFoundCellsDisplay() {
                const level = getCurrentLevel();
                const cells = foundCells.querySelectorAll('.found-cell');
                const foundArr = Array.from(foundSet);
                cells.forEach((cell,i) => {
                    if(i < foundArr.length) { cell.textContent = foundArr[i]; cell.classList.add('filled'); }
                    else { cell.textContent = ''; cell.classList.remove('filled'); }
                });
                progressMini.textContent = `${foundArr.length} / ${level.hiddenWords.length}`;
            }
            function renderCandidateChips(candidates) {
                candidateChips.innerHTML = '';
                candidates.forEach(word => {
                    const chip = document.createElement('button');
                    chip.className = 'candidate-chip';
                    chip.textContent = word;
                    chip.dataset.word = word;
                    if(foundSet.has(word)) chip.classList.add('found');
                    chip.addEventListener('click', () => handleChipClick(chip, word));
                    candidateChips.appendChild(chip);
                });
            }

            function handleChipClick(chip, word) {
                if (!isGameActive || isPaused) return;
                if (lives <= 0) { showToast('💔 生命不足，请续命后再作答', 2000); return; }
                const level = getCurrentLevel();
                if (foundSet.has(word)) return;
                if (level.hiddenWords.includes(word)) {
                    foundSet.add(word);
                    chip.classList.add('found');
                    updateFoundCellsDisplay();
                    sfxCorrect();
                    totalScore += 10;
                    updateScoreDisplay();
                    saveProgress();
                    showToast('✅ 找到了「' + word + '」！+10分', 1500);
                    if (foundSet.size >= level.hiddenWords.length) handleWin();
                } else {
                    chip.classList.add('wrong-flash');
                    sfxWrong();
                    timeLeft = Math.max(0, timeLeft - 3);
                    totalScore = Math.max(0, totalScore - 5);
                    updateTimerDisplay();
                    updateScoreDisplay();
                    loseLife();
                    showToast(`❌ 错！-3秒 -5分 (生命-1)`, 2000);
                    setTimeout(() => chip.classList.remove('wrong-flash'), 500);
                }
            }

            function handleWin() {
                clearInterval(timerInterval);
                isGameActive = false;
                totalScore += 100;
                updateScoreDisplay();
                completedLevels.add(currentLevelIndex);
                saveProgress();
                sfxWin();
                if (typeof window._dailyChallengeIndex !== 'undefined') {
                    completeDailyChallenge(window._dailyChallengeIndex);
                    delete window._dailyChallengeIndex;
                }
                showResultModal(true);
            }
            function handleTimeUp() {
                clearInterval(timerInterval);
                isGameActive = false;
                showResultModal(false);
            }
            function updateTimerDisplay() {
                const mins = Math.floor(timeLeft/60);
                const secs = timeLeft%60;
                timerDisplay.textContent = `⏱ ${mins}:${secs.toString().padStart(2,'0')}`;
                timerDisplay.classList.toggle('warning', timeLeft <= 15);
            }
            function updateScoreDisplay() { scoreDisplay.textContent = totalScore; }
            function startTimer() {
                clearInterval(timerInterval);
                updateTimerDisplay();
                timerInterval = setInterval(() => {
                    if (isPaused) return;
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 15 && timeLeft > 0) sfxTick();
                    if (timeLeft <= 0) handleTimeUp();
                }, 1000);
            }
            function resetGameState() {

                foundSet.clear();

                reviveUsed = false;
                updateTimerDisplay();
                timerDisplay.classList.remove('warning');
                updateScoreDisplay();
                btnHint.disabled = false;

            }
            function loadLevel(index) {

                updateScoreDisplay();
                updateLivesAndRecoveryDisplay();
                saveProgress();

            // ==================== 广告系统（CrazyGames + 模拟降级） ====================
            function showAd(title, subtitle, callback) {
                // 尝试使用 CrazyGames 广告
                if (typeof CrazyGames !== 'undefined' && CrazyGames.SDK && CrazyGames.SDK.ad) {
                    CrazyGames.SDK.ad.requestAd('midgame', {
                        onAdStarted: () => {
                            isPaused = true;
                        },
                        onAdError: (err) => {
                            console.warn('CrazyGames 广告加载失败，降级为模拟广告', err);
                            // 降级为模拟广告
                            showMockAd(title, subtitle, callback);
                        },
                        onAdFinished: () => {
                            isPaused = false;
                            if (callback) callback();
                        }
                    });
                } else {
                    // 无 CrazyGames SDK，模拟广告
                    showMockAd(title, subtitle, callback);
                }
            }

            // 模拟广告（保留原有逻辑）
            function showMockAd(title, subtitle, callback) {
                if (adCountdownTimer) clearInterval(adCountdownTimer);
                adCallback = callback;
                adTitle.textContent = title || '广告播放中...';
                adSubtitle.textContent = subtitle || '请观看广告以获取奖励';
                adCountdown.textContent = '5';

                btnCloseAd.classList.remove('visible');

                        btnCloseAd.classList.add('visible');

            }
            function closeAd() {

            }
            btnCloseAd.addEventListener('click', () => { if (btnCloseAd.classList.contains('visible')) closeAd(); });

            // ==================== 提示系统 ====================
            function updateHintAvailability() {
                const totalAllowed = MAX_HINTS + doubleHintCount;
                btnHint.disabled = hintUsedCount >= totalAllowed;
            }
            btnHint.addEventListener('click', () => {
                if (!isGameActive || isPaused) return;
                if (lives <= 0) { showToast('💔 生命不足，无法使用提示', 1500); return; }
                const level = getCurrentLevel();
                const unfound = level.hiddenWords.filter(w => !foundSet.has(w));
                if (unfound.length === 0) { showToast('所有隐藏字都已找到！', 1500); return; }
                const totalAllowed = MAX_HINTS + doubleHintCount;
                if (hintUsedCount >= totalAllowed) { showToast('提示次数已用完', 1800); return; }
                showAd('💡 观看广告获取提示', '广告结束后将自动解锁一个隐藏字', () => {
                    const stillUnfound = level.hiddenWords.filter(w => !foundSet.has(w));
                    if (stillUnfound.length > 0) {
                        const pick = stillUnfound[Math.floor(Math.random() * stillUnfound.length)];
                        foundSet.add(pick);
                        updateFoundCellsDisplay();
                        const chips = candidateChips.querySelectorAll('.candidate-chip');
                        chips.forEach(ch => { if(ch.dataset.word === pick) ch.classList.add('found'); });
                        hintUsedCount++;
                        if (doubleHintCount > 0 && hintUsedCount <= MAX_HINTS + doubleHintCount) {
                            const nextUnfound = level.hiddenWords.filter(w => !foundSet.has(w));
                            if (nextUnfound.length > 0) {
                                const second = nextUnfound[Math.floor(Math.random() * nextUnfound.length)];
                                foundSet.add(second);
                                updateFoundCellsDisplay();
                                const chips2 = candidateChips.querySelectorAll('.candidate-chip');
                                chips2.forEach(ch => { if(ch.dataset.word === second) ch.classList.add('found'); });
                                hintUsedCount++;
                                doubleHintCount--;
                                saveProgress();
                                showToast('💡 双倍提示！额外解锁「' + second + '」', 2000);
                            }
                        }
                        showToast('💡 已解锁「' + pick + '」', 1800);
                        totalScore += 5;
                        updateScoreDisplay();
                        saveProgress();
                        updateHintAvailability();
                        if (foundSet.size >= level.hiddenWords.length) handleWin();
                    }
                });
            });

            // ==================== 每日挑战 ====================
            const DAILY_KEY = 'hanzi_daily_challenge';
            function getTodayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
            function loadDailyData() {
                try { const raw = localStorage.getItem(DAILY_KEY); if (raw) { const data = JSON.parse(raw); if (data.date === getTodayStr()) return data; } } catch(e) {}
                return null;
            }
            function saveDailyData(data) { localStorage.setItem(DAILY_KEY, JSON.stringify(data)); }
            function generateDailyChallenge() {
                const easyPool = levelData.filter(l => l.difficulty <= 2);
                const mediumPool = levelData.filter(l => l.difficulty >= 3 && l.difficulty <= 4);
                const hardPool = levelData.filter(l => l.difficulty >= 5);
                if (easyPool.length === 0 || mediumPool.length === 0 || hardPool.length === 0) { showToast('关卡不足，无法生成每日挑战', 3000); return null; }
                const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
                const challenges = [
                    { type: '简单', levelId: pickRandom(easyPool).id },
                    { type: '中等', levelId: pickRandom(mediumPool).id },
                    { type: '地狱', levelId: pickRandom(hardPool).id }
                ];
                const data = { date: getTodayStr(), challenges, completed: [false, false, false] };
                saveDailyData(data);
                return data;
            }
            function getDailyData() { let data = loadDailyData(); if (!data) data = generateDailyChallenge(); return data; }
            function completeDailyChallenge(index) {
                const data = loadDailyData(); if (!data || data.date !== getTodayStr()) return false;
                data.completed[index] = true;
                saveDailyData(data);
                if (data.completed.every(v => v)) {
                    doubleHintCount += 2;
                    saveProgress();
                    updateHintAvailability();
                    showToast('🎉 完成全部每日挑战！获得双倍提示道具x2！', 3500);
                }
                return true;
            }
            window.startDailyLevel = function(index) {
                const data = loadDailyData(); if (!data) return;
                const levelId = data.challenges[index].levelId;
                const levelIndex = levelData.findIndex(l => l.id === levelId);
                if (levelIndex >= 0) {
                    document.getElementById('dailyOverlay')?.remove();
                    loadLevel(levelIndex);
                    window._dailyChallengeIndex = index;
                }
            };
            btnDaily.addEventListener('click', () => {
                if (isGameActive && !isPaused) isPaused = true;
                const data = getDailyData(); if (!data) return;
                let html = `<h3>📅 每日挑战 (${data.date})</h3><div style="display:flex; flex-direction:column; gap:12px;">`;
                data.challenges.forEach((ch, idx) => {
                    const level = levelData.find(l => l.id === ch.levelId);
                    const completed = data.completed[idx];
                    html += `<div style="display:flex; align-items:center; justify-content:space-between; padding:10px; background:#fef9f0; border-radius:12px;">
                        <span>${ch.type}：<b>${level.character}</b> (第${level.id}关)</span>
                        <button class="btn" ${completed ? 'disabled' : ''} onclick="startDailyLevel(${idx})">${completed ? '已完成' : '挑战'}</button>
                    </div>`;
                });
                html += `<button class="btn" style="margin-top:12px;" onclick="document.getElementById('dailyOverlay').remove(); if(window.isPaused) isPaused=false;">关闭</button>`;
                let overlay = document.createElement('div'); overlay.id = 'dailyOverlay'; overlay.className = 'level-select-overlay';
                overlay.innerHTML = `<div class="level-select-modal" style="text-align:center;">${html}</div>`;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); if (isPaused && isGameActive) isPaused = false; } });
            });

            // ==================== 结果弹窗与科普 ====================
            function getCharDescription(character) {
                const level = levelData.find(l => l.character === character);
                if (level && level.description) return level.description;
                return charDescriptions[character] || null;
            }
            function showResultModal(isWin) {

                    const sentence = level.sentence;
                    if (sentence) extraHTML += `<div style="background:#fef9e7; border-radius:12px; padding:12px; margin:12px 0; font-size:0.9rem; color:#5d4e37; text-align:left;">✏️ <b>造句：</b>${sentence}</div>`;
                }
                if (isWin) {
                    resultModal.innerHTML = `
                        <div class="result-icon">🎉</div>

                        <div class="result-subtitle">你成功找出了「${level.character}」中所有的隐藏字</div>

                            ${currentLevelIndex < levelData.length - 1 ? '<button class="btn-result btn-next" id="btnNextLevel">▶ Next（下一关）</button>' : '<button class="btn-result btn-next" style="background:#gold;color:#3e2f1c;">🏆 全部通关！</button>'}
                            <button class="btn-result btn-retry" id="btnRetryLevel">🔄 Retry（重玩）</button>
                            <button class="btn-result btn-quit" id="btnQuitResult">📂 Levels（关卡）</button>
                        </div>`;
                } else {
                    resultModal.innerHTML = `
                        <div class="result-icon">⏰</div>
                        <div class="result-title" style="color:#e74c3c;">时间到！</div>
                        <div class="result-subtitle">「${level.character}」还剩 ${level.hiddenWords.length - foundSet.size} 个隐藏字未找到</div>

                        <div class="result-buttons">

                            <button class="btn-result btn-retry" id="btnRetryLevel">🔄 Retry（重玩）</button>
                            <button class="btn-result btn-quit" id="btnQuitResult">📂 Levels（关卡）</button>
                        </div>`;
                }
                setTimeout(() => {
                    const btnNext = $('#btnNextLevel'); const btnRetry = $('#btnRetryLevel'); const btnQuit = $('#btnQuitResult'); const btnReviveTime = $('#btnReviveTime');
                    if (btnNext) btnNext.addEventListener('click', () => { resultOverlay.style.display = 'none'; if (currentLevelIndex < levelData.length - 1) loadLevel(currentLevelIndex + 1); else { showToast('🏆 恭喜！你已通关全部关卡！', 3000); loadLevel(0); } });
                    if (btnRetry) btnRetry.addEventListener('click', () => { resultOverlay.style.display = 'none'; loadLevel(currentLevelIndex); });
                    if (btnQuit) btnQuit.addEventListener('click', () => { resultOverlay.style.display = 'none'; openLevelSelect(); });
                    if (btnReviveTime) btnReviveTime.addEventListener('click', () => { resultOverlay.style.display = 'none'; showAd('📺 观看广告获得加时', '广告结束后增加30秒继续挑战', () => { timeLeft += BONUS_TIME; reviveUsed = true; isGameActive = true; isPaused = false; updateTimerDisplay(); timerDisplay.classList.remove('warning'); startTimer(); showToast('⏱ +30秒！继续加油！', 2000); }); });
                }, 100);
            }

            // ==================== 关卡选择 ====================
            function openLevelSelect() { levelSelectOverlay.style.display = 'flex'; renderLevelGrid(); }
            function renderLevelGrid() {
                levelGrid.innerHTML = '';
                levelData.forEach((lv, idx) => {
                    const cell = document.createElement('div'); cell.className = 'level-cell';
                    if (completedLevels.has(idx)) cell.classList.add('completed');
                    if (idx === currentLevelIndex && !completedLevels.has(idx)) cell.classList.add('current');
                    const isUnlocked = idx === 0 || completedLevels.has(idx-1) || completedLevels.has(idx);
                    if (!isUnlocked && idx > 0) cell.classList.add('locked');
                    cell.innerHTML = `<span class="level-num">${lv.id}</span><span class="level-char">${lv.character}</span><span class="level-stars">${'★'.repeat(lv.difficulty)}</span>`;
                    cell.addEventListener('click', () => { if (cell.classList.contains('locked')) return; levelSelectOverlay.style.display = 'none'; loadLevel(idx); });
                    levelGrid.appendChild(cell);
                });
            }
            btnLevels.addEventListener('click', () => { if (isGameActive && !isPaused) isPaused = true; openLevelSelect(); });
            btnCloseLevelSelect.addEventListener('click', () => { levelSelectOverlay.style.display = 'none'; if (isPaused && isGameActive) isPaused = false; });
            levelSelectOverlay.addEventListener('click', (e) => { if (e.target === levelSelectOverlay) { levelSelectOverlay.style.display = 'none'; if (isPaused && isGameActive) isPaused = false; } });
            resultOverlay.addEventListener('click', (e) => { if (e.target === resultOverlay) resultOverlay.style.display = 'none'; });

            // ==================== 按钮事件 ====================
            btnRevive.addEventListener('click', reviveLife);

            // ==================== 窗口事件 ====================
            window.addEventListener('resize', () => setTimeout(redrawCanvas, 250));
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (adOverlay.style.display === 'flex' && btnCloseAd.classList.contains('visible')) closeAd();
                    else if (levelSelectOverlay.style.display === 'flex') { levelSelectOverlay.style.display = 'none'; if (isPaused && isGameActive) isPaused = false; }
                    else if (resultOverlay.style.display === 'flex') resultOverlay.style.display = 'none';
                }
            });

            // ==================== 初始化 ====================
            function init() {
                loadProgress();
                if (currentLevelIndex >= levelData.length) currentLevelIndex = 0;
                if (currentLevelIndex < 0) currentLevelIndex = 0;
                updateScoreDisplay();
                updateLivesAndRecoveryDisplay();
                startRecoveryTimer();
                updateHintAvailability();
                loadLevel(currentLevelIndex);
                setTimeout(redrawCanvas, 200);
            }
            init();
            console.log('🀄 汉字拆字大师 - CrazyGames 广告已接入');
        })();
    </script>
</body>
</html>
