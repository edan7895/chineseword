<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>汉字拆字大师 - 寻字解谜</title>
    <style>
        :root {
            --bg: #fdf6ee;
            --card-bg: #fffef9;
            --primary: #c0392b;
            --primary-light: #e74c3c;
            --gold: #d4a017;
            --gold-light: #f0c75e;
            --text: #3e2f1c;
            --text-light: #6b5d4f;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.10);
            --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.14);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --font-serif: 'STKaiti', 'KaiTi', '楷体', 'Noto Serif SC', 'Songti SC', '宋体', serif;
            --font-sans: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --cell-size: 48px;
            --cell-size-mobile: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(160deg, #fdf6ee 0%, #f7efe0 30%, #faf3e6 60%, #fdf8f2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        .app-container {
            width: 100%;
            max-width: 820px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(180, 150, 110, 0.15);
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: linear-gradient(180deg, #fffef9 0%, #fdf8f0 100%);
            border-bottom: 1px solid rgba(180, 150, 110, 0.18);
            flex-wrap: wrap;
            gap: 10px;
            position: relative;
            z-index: 5;
        }
        .top-bar .level-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .top-bar .level-badge {
            background: var(--primary);
            color: #fff;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .top-bar .timer {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text);
            background: #fef9f0;
            border-radius: 20px;
            padding: 5px 14px;
            border: 1.5px solid rgba(180, 150, 110, 0.25);
            min-width: 80px;
            justify-content: center;
            transition: all var(--transition);
        }
        .top-bar .timer.warning {
            color: #e74c3c;
            border-color: #e74c3c;
            animation: pulse-warning 0.7s ease-in-out infinite;
            background: #fff5f5;
        }
        @keyframes pulse-warning {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }
        .top-bar .score-display {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--gold);
            background: #fffef7;
            border-radius: 20px;
            padding: 5px 13px;
            border: 1.5px solid rgba(212, 160, 23, 0.3);
            white-space: nowrap;
        }
        .top-bar .score-display .coin-icon {
            font-size: 1.2rem;
        }

        .game-main {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 18px;
            align-items: flex-start;
            justify-content: center;
        }

        .big-char-zone {
            flex: 1 1 240px;
            min-width: 200px;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .big-char-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 320px;
            max-height: 320px;
            cursor: pointer;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
            background: #fffef9;
            border: 2px solid rgba(180, 150, 110, 0.2);
        }
        .big-char-wrapper:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-sm);
        }
        .big-char-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: var(--radius-md);
        }
        .big-char-label {
            font-size: 0.85rem;
            color: var(--text-light);
            letter-spacing: 2px;
            font-family: var(--font-serif);
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(212, 160, 23, 0.45);
            transform: scale(0);
            animation: ripple-anim 0.7s ease-out forwards;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes ripple-anim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .right-panel {
            flex: 1 1 280px;
            min-width: 240px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .found-grid-section {
            background: #fefcf7;
            border-radius: var(--radius-md);
            padding: 14px 16px;
            border: 1.5px solid rgba(180, 150, 110, 0.2);
            box-shadow: var(--shadow-sm);
        }
        .found-grid-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-align: center;
        }
        .found-cells {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .found-cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: 2px dashed rgba(180, 150, 110, 0.35);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-family: var(--font-serif);
            font-weight: 700;
            color: #c9b896;
            background: #fefefb;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: default;
        }
        .found-cell.filled {
            border-color: var(--gold);
            border-style: solid;
            background: #fffef5;
            color: var(--text);
            animation: cell-pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 3px 12px rgba(212, 160, 23, 0.25);
        }
        @keyframes cell-pop {
            0% { transform: scale(0.3) rotateY(90deg); opacity: 0; }
            50% { transform: scale(1.15) rotateY(0deg); opacity: 1; }
            100% { transform: scale(1) rotateY(0deg); }
        }
        .progress-mini {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 8px;
            font-weight: 600;
        }

        .candidate-section {
            background: #fefcf7;
            border-radius: var(--radius-md);
            padding: 14px 16px;
            border: 1.5px solid rgba(180, 150, 110, 0.2);
            box-shadow: var(--shadow-sm);
        }
        .candidate-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-align: center;
        }
        .candidate-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 9px;
            justify-content: center;
        }
        .candidate-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 46px;
            height: 46px;
            padding: 6px 14px;
            border-radius: 23px;
            font-size: 1.1rem;
            font-family: var(--font-serif);
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            background: #fffef9;
            border: 2px solid rgba(180, 150, 110, 0.3);
            color: var(--text);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .candidate-chip:hover {
            border-color: var(--gold);
            background: #fffef3;
            box-shadow: 0 4px 14px rgba(212, 160, 23, 0.2);
            transform: translateY(-2px);
        }
        .candidate-chip:active {
            transform: scale(0.93);
            transition: 0.1s;
        }
        .candidate-chip.found {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
            pointer-events: none;
            opacity: 0.7;
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            text-decoration-color: #4caf50;
        }
        .candidate-chip.wrong-flash {
            animation: shake 0.5s ease;
            background: #fff0f0;
            border-color: #e74c3c;
            color: #c0392b;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(4px); }
        }

        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 18px;
            border-top: 1px solid rgba(180, 150, 110, 0.18);
            flex-wrap: wrap;
            background: #fffef9;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            letter-spacing: 0.5px;
            font-family: var(--font-sans);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-hint {
            background: #fff8e1;
            color: #b8860b;
            border: 2px solid rgba(212, 160, 23, 0.4);
        }
        .btn-hint:hover {
            background: #fff3cd;
            border-color: var(--gold);
            box-shadow: 0 4px 16px rgba(212, 160, 23, 0.25);
        }
        .btn-hint:active {
            transform: scale(0.94);
        }
        .btn-levels {
            background: #f5f0e8;
            color: var(--text);
            border: 2px solid rgba(180, 150, 110, 0.3);
        }
        .btn-levels:hover {
            background: #ede5d8;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }
        .btn-levels:active {
            transform: scale(0.94);
        }
        .btn-ad {
            background: linear-gradient(135deg, #ff6b6b, #e74c3c);
            color: #fff;
            border: none;
            box-shadow: 0 4px 16px rgba(231, 76, 60, 0.35);
            animation: gentle-glow 2s ease-in-out infinite;
        }
        @keyframes gentle-glow {
            0%, 100% { box-shadow: 0 4px 16px rgba(231, 76, 60, 0.35); }
            50% { box-shadow: 0 6px 24px rgba(231, 76, 60, 0.55); }
        }
        .btn-ad:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(231, 76, 60, 0.5);
        }
        .btn-ad:active {
            transform: scale(0.94);
        }
        .btn:disabled {
            opacity: 0.45;
            pointer-events: none;
            cursor: not-allowed;
        }

        /* 锁定遮罩 */
        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.78);
            z-index: 996;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fade-in 0.3s ease;
        }
        .lock-modal {
            background: #fffef9;
            border-radius: var(--radius-lg);
            padding: 28px 22px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: pop-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .lock-modal .lock-icon {
            font-size: 3.5rem;
            margin-bottom: 8px;
        }
        .lock-modal .lock-title {
            font-weight: 900;
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .lock-modal .lock-subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 14px;
        }
        .lock-modal .lock-countdown {
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--text);
            letter-spacing: 2px;
            margin: 10px 0;
        }
        .lock-modal .lock-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-top: 16px;
        }
        .btn-unlock-ad {
            background: linear-gradient(135deg, #ff6b6b, #e74c3c);
            color: #fff;
            border: none;
            border-radius: 25px;
            padding: 12px 26px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all var(--transition);
            box-shadow: 0 4px 14px rgba(231, 76, 60, 0.35);
            width: 80%;
            text-align: center;
        }
        .btn-unlock-ad:hover {
            background: #c0392b;
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.5);
        }
        .btn-wait {
            background: #f5f0e8;
            color: var(--text);
            border: 2px solid rgba(180, 150, 110, 0.3);
            border-radius: 25px;
            padding: 10px 20px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all var(--transition);
            width: 80%;
            text-align: center;
        }
        .btn-wait:hover {
            background: #ede5d8;
        }

        .ad-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.82);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fade-in 0.3s ease;
        }
        .ad-modal {
            background: #fffef9;
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: pop-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ad-modal .ad-icon { font-size: 3rem; margin-bottom: 8px; }
        .ad-modal .ad-title { font-weight: 700; font-size: 1.2rem; color: var(--text); margin-bottom: 6px; }
        .ad-modal .ad-subtitle { font-size: 0.85rem; color: var(--text-light); margin-bottom: 16px; }
        .ad-modal .ad-countdown { font-size: 2.8rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; margin: 10px 0; font-family: var(--font-sans); }
        .ad-modal .ad-progress-bar { width: 100%; height: 6px; background: #e8e0d5; border-radius: 3px; overflow: hidden; margin: 10px 0 16px; }
        .ad-modal .ad-progress-fill { height: 100%; background: linear-gradient(90deg, #e74c3c, #f39c12); border-radius: 3px; transition: width 0.95s linear; }
        .ad-modal .btn-close-ad {
            display: inline-block; padding: 10px 28px; border-radius: 25px; font-weight: 700; font-size: 0.95rem; cursor: pointer; border: none;
            background: #4caf50; color: #fff; letter-spacing: 1px; transition: all var(--transition); opacity: 0; pointer-events: none; transform: translateY(8px);
        }
        .ad-modal .btn-close-ad.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .ad-modal .btn-close-ad:hover { background: #388e3c; box-shadow: 0 6px 18px rgba(76, 175, 80, 0.4); }

        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 998;
            display: flex; align-items: center; justify-content: center; animation: fade-in 0.3s ease;
        }
        .result-modal {
            background: #fffef9; border-radius: var(--radius-lg); padding: 28px 22px; text-align: center; max-width: 420px; width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); animation: pop-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .result-modal .result-icon { font-size: 4rem; margin-bottom: 6px; }
        .result-modal .result-title { font-weight: 900; font-size: 1.5rem; margin-bottom: 4px; letter-spacing: 1px; }
        .result-modal .result-subtitle { font-size: 0.9rem; color: var(--text-light); margin-bottom: 14px; }
        .result-modal .result-score { font-size: 1.1rem; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
        .result-modal .result-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .btn-result { padding: 11px 22px; border-radius: 25px; font-weight: 700; font-size: 0.9rem; cursor: pointer; border: none; letter-spacing: 0.5px; transition: all var(--transition); font-family: var(--font-sans); }
        .btn-next { background: #4caf50; color: #fff; box-shadow: 0 4px 14px rgba(76, 175, 80, 0.35); }
        .btn-next:hover { background: #388e3c; box-shadow: 0 6px 20px rgba(76, 175, 80, 0.45); }
        .btn-retry { background: #ff9800; color: #fff; box-shadow: 0 4px 14px rgba(255, 152, 0, 0.35); }
        .btn-retry:hover { background: #f57c00; box-shadow: 0 6px 20px rgba(255, 152, 0, 0.45); }
        .btn-quit { background: #f5f0e8; color: var(--text); border: 2px solid rgba(180, 150, 110, 0.3); }
        .btn-quit:hover { background: #ede5d8; }

        .level-select-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 997; display: flex; align-items: center; justify-content: center; animation: fade-in 0.3s ease; }
        .level-select-modal { background: #fffef9; border-radius: var(--radius-lg); padding: 20px 16px; max-width: 500px; width: 92%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.35); }
        .level-select-modal h3 { text-align: center; font-size: 1.3rem; font-weight: 900; margin-bottom: 14px; }
        .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px,1fr)); gap: 10px; }
        .level-cell { aspect-ratio: 1/1; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: all var(--transition); border: 2px solid rgba(180,150,110,0.25); background: #fffef9; position: relative; font-family: var(--font-serif); }
        .level-cell:hover { border-color: var(--gold); box-shadow: 0 4px 14px rgba(212,160,23,0.2); transform: translateY(-3px); }
        .level-cell.completed { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .level-cell.completed::after { content: '✓'; position: absolute; top: 4px; right: 8px; font-size: 0.7rem; color: #4caf50; font-weight: 900; }
        .level-cell.current { border-color: var(--primary); border-width: 3px; box-shadow: 0 0 0 4px rgba(192,57,43,0.12); background: #fff5f5; }
        .level-cell.locked { opacity: 0.4; pointer-events: none; background: #f5f0ea; color: #c5b8a5; }
        .level-cell .level-num { font-size: 0.7rem; font-family: var(--font-sans); color: var(--text-light); }
        .level-cell .level-char { font-size: 1.4rem; line-height: 1; }
        .level-cell .level-stars { font-size: 0.55rem; letter-spacing: -1px; }
        .close-level-select { display: block; margin: 16px auto 0; padding: 10px 28px; border-radius: 25px; font-weight: 700; cursor: pointer; border: none; background: #f5f0e8; color: var(--text); }

        .toast { position: fixed; top:20px; left:50%; transform:translateX(-50%); background:#3e2f1c; color:#fff; padding:10px 22px; border-radius:25px; font-weight:700; font-size:0.9rem; z-index:1000; pointer-events:none; animation:toast-in 0.4s ease, toast-out 0.4s ease 1.6s forwards; }
        @keyframes toast-in { from{opacity:0;transform:translateX(-50%) translateY(-30px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes toast-out { from{opacity:1;transform:translateX(-50%) translateY(0);} to{opacity:0;transform:translateX(-50%) translateY(-30px);} }

        @media (max-width: 600px) {
            .game-main { flex-direction: column; align-items: center; gap:12px; padding:12px; }
            .big-char-zone { max-width:260px; flex:none; }
            .big-char-wrapper { max-width:260px; max-height:260px; }
            .right-panel { width:100%; flex:none; }
            .found-cell { width:var(--cell-size-mobile); height:var(--cell-size-mobile); font-size:1.1rem; }
            .candidate-chip { min-width:38px; height:40px; padding:5px 10px; font-size:0.95rem; border-radius:20px; }
            .top-bar { padding:10px 12px; gap:6px; font-size:0.85rem; }
            .top-bar .timer { font-size:0.95rem; padding:4px 10px; min-width:60px; }
            .btn { padding:8px 14px; font-size:0.8rem; }
            .bottom-bar { gap:8px; padding:10px 12px; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="top-bar">
            <div class="level-info">
                <span class="level-badge" id="levelBadge">第1关</span>
                <span id="levelTitle">★</span>
            </div>
            <div class="timer" id="timerDisplay">⏱ 90秒</div>
            <div class="score-display">
                <span class="coin-icon">🪙</span>
                <span id="scoreDisplay">0</span>
            </div>
        </div>

        <div class="game-main">
            <div class="big-char-zone">
                <div class="big-char-wrapper" id="bigCharWrapper">
                    <canvas id="bigCharCanvas"></canvas>
                </div>
                <div class="big-char-label">👆 点击大字观察结构</div>
            </div>

            <div class="right-panel">
                <div class="found-grid-section">
                    <div class="found-grid-title">📋 已找到的隐藏字</div>
                    <div class="found-cells" id="foundCells"></div>
                    <div class="progress-mini" id="progressMini">0 / 0</div>
                </div>
                <div class="candidate-section">
                    <div class="candidate-title">🔍 候选字（点击选择）</div>
                    <div class="candidate-chips" id="candidateChips"></div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="btn btn-hint" id="btnHint">💡 提示</button>
            <button class="btn btn-levels" id="btnLevels">📂 关卡选择</button>
        </div>
    </div>

    <!-- 锁定遮罩 -->
    <div class="lock-overlay" id="lockOverlay" style="display:none;">
        <div class="lock-modal">
            <div class="lock-icon">🔒</div>
            <div class="lock-title">关卡已锁定</div>
            <div class="lock-subtitle" id="lockReason">错误次数过多，请等待或观看广告</div>
            <div class="lock-countdown" id="lockCountdown">02:00</div>
            <div class="lock-buttons">
                <button class="btn-unlock-ad" id="btnUnlockAd">📺 看广告立即解锁</button>
                <button class="btn-wait" id="btnWaitUnlock">⏳ 等待倒计时结束</button>
            </div>
        </div>
    </div>

    <!-- 广告遮罩 -->
    <div class="ad-overlay" id="adOverlay" style="display:none;">
        <div class="ad-modal">
            <div class="ad-icon">📺</div>
            <div class="ad-title" id="adTitle">广告播放中...</div>
            <div class="ad-subtitle" id="adSubtitle">请观看广告以获取奖励</div>
            <div class="ad-countdown" id="adCountdown">5</div>
            <div class="ad-progress-bar">
                <div class="ad-progress-fill" id="adProgressFill" style="width:0%;"></div>
            </div>
            <button class="btn-close-ad" id="btnCloseAd">✓ 关闭广告</button>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="result-overlay" id="resultOverlay" style="display:none;">
        <div class="result-modal" id="resultModal"></div>
    </div>

    <!-- 关卡选择 -->
    <div class="level-select-overlay" id="levelSelectOverlay" style="display:none;">
        <div class="level-select-modal" id="levelSelectModal">
            <h3>📂 选择关卡</h3>
            <div class="level-grid" id="levelGrid"></div>
            <button class="close-level-select" id="btnCloseLevelSelect">关闭</button>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="level.js"></script>
    <script>
        (function() {
            if (typeof levelData === 'undefined') {
                alert('关卡数据加载失败，请检查 level.js 文件是否存在。');
                return;
            }

            // ========== 游戏状态 ==========
            let currentLevelIndex = 0;
            let totalScore = 0;
            let foundSet = new Set();
            let timeLeft = 90;
            const TOTAL_TIME = 90;
            const BONUS_TIME = 30;
            let timerInterval = null;
            let isGameActive = false;
            let isPaused = false;
            let hintUsedCount = 0;
            const MAX_HINTS = 2;
            let reviveUsed = false;
            let adCallback = null;
            let adCountdownTimer = null;
            let completedLevels = new Set();

            // 错误惩罚相关
            let wrongAttempts = 0;          // 本关累计错误次数
            let lockUntil = null;          // 锁定截止时间戳 (毫秒)
            let lockTimerInterval = null;  // 锁定倒计时刷新

            // ========== DOM ==========
            const $ = (sel) => document.querySelector(sel);
            const bigCharWrapper = $('#bigCharWrapper');
            const bigCharCanvas = $('#bigCharCanvas');
            const ctx = bigCharCanvas.getContext('2d');
            const foundCells = $('#foundCells');
            const candidateChips = $('#candidateChips');
            const progressMini = $('#progressMini');
            const timerDisplay = $('#timerDisplay');
            const scoreDisplay = $('#scoreDisplay');
            const levelBadge = $('#levelBadge');
            const levelTitle = $('#levelTitle');
            const btnHint = $('#btnHint');
            const btnLevels = $('#btnLevels');
            const adOverlay = $('#adOverlay');
            const adTitle = $('#adTitle');
            const adSubtitle = $('#adSubtitle');
            const adCountdown = $('#adCountdown');
            const adProgressFill = $('#adProgressFill');
            const btnCloseAd = $('#btnCloseAd');
            const resultOverlay = $('#resultOverlay');
            const resultModal = $('#resultModal');
            const levelSelectOverlay = $('#levelSelectOverlay');
            const levelGrid = $('#levelGrid');
            const btnCloseLevelSelect = $('#btnCloseLevelSelect');
            const toastContainer = $('#toastContainer');
            const lockOverlay = $('#lockOverlay');
            const lockCountdown = $('#lockCountdown');
            const lockReason = $('#lockReason');
            const btnUnlockAd = $('#btnUnlockAd');
            const btnWaitUnlock = $('#btnWaitUnlock');

            // ========== 音效 ==========
            let audioCtx = null;
            function getAudioCtx() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} return audioCtx; }
            function playBeep(freq, duration, type='sine', vol=0.15) {
                const ctx = getAudioCtx(); if(!ctx) return;
                try {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.type = type; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(vol, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
                } catch(e) {}
            }
            function sfxCorrect() { playBeep(880,0.12); playBeep(1100,0.1); }
            function sfxWrong() { playBeep(180,0.25,'triangle',0.2); }
            function sfxWin() { playBeep(660,0.12); setTimeout(()=>playBeep(880,0.12),120); setTimeout(()=>playBeep(1100,0.18),240); }
            function sfxTick() { playBeep(440,0.06,'square',0.08); }
            function sfxUnlock() { playBeep(1320,0.08,'sine',0.2); }

            // ========== Toast ==========
            function showToast(msg, duration=2000) {
                const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
                toastContainer.appendChild(el);
                setTimeout(()=>{ if(el.parentNode) el.remove(); }, duration+500);
            }

            // ========== 持久化 ==========
            function saveProgress() {
                try {
                    const data = {
                        totalScore,
                        completedLevels: Array.from(completedLevels),
                        currentLevelIndex,
                        wrongAttempts,
                        lockUntil: lockUntil ? lockUntil : null,
                    };
                    localStorage.setItem('hanzi_game_progress', JSON.stringify(data));
                } catch(e) {}
            }
            function loadProgress() {
                try {
                    const raw = localStorage.getItem('hanzi_game_progress');
                    if (raw) {
                        const data = JSON.parse(raw);
                        totalScore = data.totalScore || 0;
                        completedLevels = new Set(data.completedLevels || []);
                        currentLevelIndex = data.currentLevelIndex || 0;
                        wrongAttempts = data.wrongAttempts || 0;
                        lockUntil = data.lockUntil || null;
                        if (currentLevelIndex >= levelData.length) currentLevelIndex = levelData.length - 1;
                        if (currentLevelIndex < 0) currentLevelIndex = 0;
                        // 如果锁定时间已过，自动清除
                        if (lockUntil && Date.now() >= lockUntil) {
                            lockUntil = null;
                            // 注意：不清除错误次数，玩家已经等过了
                        }
                    }
                } catch(e) {}
            }

            // ========== Canvas ==========
            function drawBigChar(character) {
                const rect = bigCharWrapper.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                const w = rect.width, h = rect.height;
                if (w<=0||h<=0) return;
                bigCharCanvas.width = w*dpr; bigCharCanvas.height = h*dpr;
                bigCharCanvas.style.width = w+'px'; bigCharCanvas.style.height = h+'px';
                ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
                ctx.fillStyle='#fffef9'; ctx.fillRect(0,0,w,h);
                const cx=w/2, cy=h/2, margin=w*0.12;
                ctx.strokeStyle='rgba(180,150,110,0.35)'; ctx.lineWidth=1.2;
                ctx.setLineDash([6,4]);
                ctx.beginPath(); ctx.moveTo(margin,cy); ctx.lineTo(w-margin,cy); ctx.moveTo(cx,margin); ctx.lineTo(cx,h-margin); ctx.stroke();
                ctx.setLineDash([]);
                ctx.strokeStyle='rgba(180,150,110,0.55)'; ctx.lineWidth=2.5; ctx.strokeRect(margin,margin,w-2*margin,h-2*margin);
                const fontSize = Math.min(w,h)*0.58;
                ctx.fillStyle='#3e2f1c'; ctx.font=`700 ${fontSize}px "STKaiti","KaiTi","楷体","Noto Serif SC","Songti SC","宋体",serif`;
                ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText(character, cx, cy);
                ctx.fillStyle='rgba(0,0,0,0.04)'; ctx.fillText(character, cx+1.5, cy+2);
                ctx.fillStyle='#3e2f1c'; ctx.fillText(character, cx, cy);
            }
            function redrawCanvas() { const level = levelData[currentLevelIndex]; if(level) drawBigChar(level.character); }

            function spawnRipple(x,y) {
                const ripple = document.createElement('div'); ripple.className='ripple';
                const size = Math.max(bigCharWrapper.offsetWidth, bigCharWrapper.offsetHeight)*0.3;
                ripple.style.width=size+'px'; ripple.style.height=size+'px';
                ripple.style.left=(x-size/2)+'px'; ripple.style.top=(y-size/2)+'px';
                bigCharWrapper.appendChild(ripple);
                ripple.addEventListener('animationend', ()=>ripple.remove());
            }
            bigCharWrapper.addEventListener('click', (e) => {
                if (!isGameActive || isPaused || isLocked()) return;
                const rect = bigCharWrapper.getBoundingClientRect();
                spawnRipple(e.clientX-rect.left, e.clientY-rect.top);
            });

            // ========== 锁定逻辑 ==========
            function isLocked() {
                return lockUntil !== null && Date.now() < lockUntil;
            }
            function getPenaltySeconds(errors) {
                if (errors <= 2) return 0;
                if (errors === 3) return 2 * 60;
                if (errors === 4) return 3 * 60;
                if (errors === 5) return 4 * 60;
                return 5 * 60; // 6次及以上
            }
            function applyLock() {
                const penalty = getPenaltySeconds(wrongAttempts);
                if (penalty <= 0) return;
                lockUntil = Date.now() + penalty * 1000;
                saveProgress();
                showLockOverlay();
                startLockTimer();
            }
            function showLockOverlay() {
                if (!lockUntil) return;
                lockOverlay.style.display = 'flex';
                updateLockCountdownDisplay();
                lockReason.textContent = `错误次数：${wrongAttempts} 次，关卡锁定中`;
            }
            function hideLockOverlay() {
                lockOverlay.style.display = 'none';
                if (lockTimerInterval) { clearInterval(lockTimerInterval); lockTimerInterval = null; }
            }
            function updateLockCountdownDisplay() {
                if (!lockUntil) return;
                const remaining = Math.max(0, Math.ceil((lockUntil - Date.now()) / 1000));
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                lockCountdown.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (remaining <= 0) {
                    handleLockExpired();
                }
            }
            function startLockTimer() {
                if (lockTimerInterval) clearInterval(lockTimerInterval);
                lockTimerInterval = setInterval(() => {
                    if (!lockUntil || Date.now() >= lockUntil) {
                        handleLockExpired();
                    } else {
                        updateLockCountdownDisplay();
                    }
                }, 500);
            }
            function handleLockExpired() {
                lockUntil = null;
                if (lockTimerInterval) { clearInterval(lockTimerInterval); lockTimerInterval = null; }
                hideLockOverlay();
                saveProgress();
                showToast('🔓 锁定时间结束，继续挑战吧！', 2000);
                // 不重置错误次数，下次再错会再次触发并递增
            }
            function unlockViaAd() {
                // 广告解锁：重置错误次数
                wrongAttempts = 0;
                lockUntil = null;
                if (lockTimerInterval) { clearInterval(lockTimerInterval); lockTimerInterval = null; }
                hideLockOverlay();
                saveProgress();
                showToast('📺 广告观看完毕，关卡已解锁！错误次数已重置', 2500);
            }

            // 广告解锁按钮
            btnUnlockAd.addEventListener('click', () => {
                if (!lockUntil) return;
                showAd('📺 观看广告解锁关卡', '广告结束后将重置错误次数并解锁', () => {
                    unlockViaAd();
                });
            });
            btnWaitUnlock.addEventListener('click', () => {
                // 只是关闭提示，实际上锁屏还在，用户需等待
                showToast('请等待倒计时结束，或观看广告立即解锁', 2000);
            });

            // ========== 游戏逻辑 ==========
            function getCurrentLevel() { return levelData[currentLevelIndex]; }
            function shuffleArray(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
            function buildCandidateList() {
                const level = getCurrentLevel();
                return shuffleArray([...new Set([...level.hiddenWords, ...level.distractors])]);
            }

            function renderFoundCells() {
                const level = getCurrentLevel();
                foundCells.innerHTML = '';
                for(let i=0; i<level.hiddenWords.length; i++) {
                    const cell = document.createElement('div'); cell.className='found-cell'; foundCells.appendChild(cell);
                }
                updateFoundCellsDisplay();
                progressMini.textContent = `0 / ${level.hiddenWords.length}`;
            }
            function updateFoundCellsDisplay() {
                const level = getCurrentLevel();
                const cells = foundCells.querySelectorAll('.found-cell');
                const foundArr = Array.from(foundSet);
                cells.forEach((cell,i) => {
                    if(i < foundArr.length) { cell.textContent = foundArr[i]; cell.classList.add('filled'); }
                    else { cell.textContent = ''; cell.classList.remove('filled'); }
                });
                progressMini.textContent = `${foundArr.length} / ${level.hiddenWords.length}`;
            }
            function renderCandidateChips(candidates) {
                candidateChips.innerHTML = '';
                candidates.forEach(word => {
                    const chip = document.createElement('button');
                    chip.className = 'candidate-chip';
                    chip.textContent = word;
                    chip.dataset.word = word;
                    if(foundSet.has(word)) chip.classList.add('found');
                    chip.addEventListener('click', () => handleChipClick(chip, word));
                    candidateChips.appendChild(chip);
                });
            }

            function handleChipClick(chip, word) {
                if (!isGameActive || isPaused) return;
                if (isLocked()) {
                    showToast('🔒 关卡已锁定，请等待或观看广告解锁', 2000);
                    return;
                }
                const level = getCurrentLevel();
                if (foundSet.has(word)) return;
                if (level.hiddenWords.includes(word)) {
                    // 正确
                    foundSet.add(word);
                    chip.classList.add('found');
                    updateFoundCellsDisplay();
                    sfxCorrect();
                    totalScore += 10;
                    updateScoreDisplay();
                    saveProgress();
                    showToast('✅ 找到了「' + word + '」！+10分', 1500);
                    if (foundSet.size >= level.hiddenWords.length) handleWin();
                } else {
                    // 错误处理
                    chip.classList.add('wrong-flash');
                    sfxWrong();
                    timeLeft = Math.max(0, timeLeft - 3);
                    updateTimerDisplay();
                    wrongAttempts++;
                    saveProgress();
                    showToast(`❌ 「${word}」不在这个字里哦，-3秒 (错误${wrongAttempts}次)`, 2000);
                    setTimeout(() => chip.classList.remove('wrong-flash'), 500);

                    // 检查是否需要锁定
                    if (wrongAttempts >= 3 && !isLocked()) {
                        applyLock();
                    } else if (isLocked()) {
                        // 已经锁定，不应该发生
                    }
                }
            }

            function handleWin() {
                clearInterval(timerInterval);
                isGameActive = false;
                totalScore += 100;
                updateScoreDisplay();
                completedLevels.add(currentLevelIndex);
                // 通关后重置错误次数
                wrongAttempts = 0;
                lockUntil = null;
                saveProgress();
                sfxWin();
                showResultModal(true);
            }
            function handleTimeUp() {
                clearInterval(timerInterval);
                isGameActive = false;
                showResultModal(false);
            }
            function updateTimerDisplay() {
                const mins = Math.floor(timeLeft/60);
                const secs = timeLeft%60;
                timerDisplay.textContent = `⏱ ${mins}:${secs.toString().padStart(2,'0')}`;
                timerDisplay.classList.toggle('warning', timeLeft <= 15);
            }
            function updateScoreDisplay() { scoreDisplay.textContent = totalScore; }
            function startTimer() {
                clearInterval(timerInterval);
                updateTimerDisplay();
                timerInterval = setInterval(() => {
                    if (isPaused || isLocked()) return;
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 15 && timeLeft > 0) sfxTick();
                    if (timeLeft <= 0) handleTimeUp();
                }, 1000);
            }
            function resetGameState() {
                clearInterval(timerInterval);
                foundSet.clear();
                timeLeft = TOTAL_TIME;
                isGameActive = true;
                isPaused = false;
                hintUsedCount = 0;
                reviveUsed = false;
                // 注意：错误次数和锁定状态在加载关卡时可能需要保留或重置？
                // 根据需求，切换关卡时应该重置错误次数和锁定，因为这是新的一关。
                wrongAttempts = 0;
                lockUntil = null;
                hideLockOverlay();
                updateTimerDisplay();
                timerDisplay.classList.remove('warning');
                updateScoreDisplay();
                btnHint.disabled = false;
            }
            function loadLevel(index) {
                if (index < 0 || index >= levelData.length) return;
                // 在加载新关卡前，保存旧关卡的错误状态可能不必要，直接重置
                currentLevelIndex = index;
                resetGameState();
                const level = getCurrentLevel();
                levelBadge.textContent = `第${level.id}关`;
                levelTitle.textContent = '★'.repeat(level.difficulty) + '☆'.repeat(5-level.difficulty);
                renderFoundCells();
                renderCandidateChips(buildCandidateList());
                redrawCanvas();
                startTimer();
                updateScoreDisplay();
                saveProgress();
                resultOverlay.style.display = 'none';
                levelSelectOverlay.style.display = 'none';
                adOverlay.style.display = 'none';
                // 检查是否从进度恢复时仍处于锁定状态
                if (isLocked()) {
                    showLockOverlay();
                    startLockTimer();
                }
            }
            function reloadCurrentLevel() { loadLevel(currentLevelIndex); }

            // ========== 广告系统 (模拟) ==========
            function showAd(title, subtitle, callback) {
                if (adCountdownTimer) clearInterval(adCountdownTimer);
                adCallback = callback;
                adTitle.textContent = title || '广告播放中...';
                adSubtitle.textContent = subtitle || '请观看广告以获取奖励';
                adCountdown.textContent = '5';
                adProgressFill.style.width = '0%';
                btnCloseAd.classList.remove('visible');
                adOverlay.style.display = 'flex';
                isPaused = true;
                let count = 5;
                adCountdownTimer = setInterval(() => {
                    count--;
                    adCountdown.textContent = count;
                    adProgressFill.style.width = ((5-count)/5*100)+'%';
                    if (count <= 0) {
                        clearInterval(adCountdownTimer);
                        adCountdownTimer = null;
                        adCountdown.textContent = '0';
                        adProgressFill.style.width = '100%';
                        btnCloseAd.classList.add('visible');
                        adTitle.textContent = '广告即将结束';
                        adSubtitle.textContent = '点击下方按钮关闭广告并领取奖励';
                    }
                }, 1000);
            }
            function closeAd() {
                if (adCountdownTimer) { clearInterval(adCountdownTimer); adCountdownTimer = null; }
                adOverlay.style.display = 'none';
                isPaused = false;
                if (adCallback) { const cb = adCallback; adCallback = null; cb(); }
            }
            btnCloseAd.addEventListener('click', () => {
                if (btnCloseAd.classList.contains('visible')) closeAd();
            });

            btnHint.addEventListener('click', () => {
                if (!isGameActive || isPaused || isLocked()) {
                    if (isLocked()) showToast('🔒 关卡已锁定，无法使用提示', 1500);
                    return;
                }
                const level = getCurrentLevel();
                const unfound = level.hiddenWords.filter(w => !foundSet.has(w));
                if (unfound.length === 0) { showToast('所有隐藏字都已找到！', 1500); return; }
                if (hintUsedCount >= MAX_HINTS) { showToast('本关提示次数已用完', 1800); return; }
                showAd('💡 观看广告获取提示', '广告结束后将自动解锁一个隐藏字', () => {
                    const stillUnfound = level.hiddenWords.filter(w => !foundSet.has(w));
                    if (stillUnfound.length > 0) {
                        const pick = stillUnfound[Math.floor(Math.random() * stillUnfound.length)];
                        foundSet.add(pick);
                        updateFoundCellsDisplay();
                        const chips = candidateChips.querySelectorAll('.candidate-chip');
                        chips.forEach(ch => { if(ch.dataset.word === pick) ch.classList.add('found'); });
                        hintUsedCount++;
                        sfxUnlock();
                        showToast('💡 已解锁「' + pick + '」', 1800);
                        totalScore += 5;
                        updateScoreDisplay();
                        saveProgress();
                        if (foundSet.size >= level.hiddenWords.length) handleWin();
                    }
                    if (hintUsedCount >= MAX_HINTS) btnHint.disabled = true;
                });
            });

            // ========== 结果弹窗 ==========
            function showResultModal(isWin) {
                resultOverlay.style.display = 'flex';
                const level = getCurrentLevel();
                if (isWin) {
                    resultModal.innerHTML = `
                        <div class="result-icon">🎉</div>
                        <div class="result-title" style="color:#4caf50;">恭喜通关！</div>
                        <div class="result-subtitle">你成功找出了「${level.character}」中所有的隐藏字</div>
                        <div class="result-score">🪙 通关奖励 +100分 | 总分：${totalScore}</div>
                        <div class="result-buttons">
                            ${currentLevelIndex < levelData.length - 1 ? '<button class="btn-result btn-next" id="btnNextLevel">▶ 下一关</button>' : '<button class="btn-result btn-next" style="background:#gold;color:#3e2f1c;">🏆 全部通关！</button>'}
                            <button class="btn-result btn-retry" id="btnRetryLevel">🔄 重玩本关</button>
                            <button class="btn-result btn-quit" id="btnQuitResult">📂 关卡选择</button>
                        </div>`;
                } else {
                    resultModal.innerHTML = `
                        <div class="result-icon">⏰</div>
                        <div class="result-title" style="color:#e74c3c;">时间到！</div>
                        <div class="result-subtitle">「${level.character}」还剩 ${level.hiddenWords.length - foundSet.size} 个隐藏字未找到</div>
                        <div class="result-score">已找到：${foundSet.size} / ${level.hiddenWords.length}</div>
                        <div class="result-buttons">
                            ${!reviveUsed ? '<button class="btn-result btn-ad" id="btnRevive">📺 看广告加时30秒</button>' : '<span style="color:#999;font-size:0.85rem;">本关已使用过复活</span>'}
                            <button class="btn-result btn-retry" id="btnRetryLevel">🔄 重新挑战</button>
                            <button class="btn-result btn-quit" id="btnQuitResult">📂 关卡选择</button>
                        </div>`;
                }
                setTimeout(() => {
                    const btnNext = $('#btnNextLevel');
                    const btnRetry = $('#btnRetryLevel');
                    const btnQuit = $('#btnQuitResult');
                    const btnRevive = $('#btnRevive');
                    if (btnNext) btnNext.addEventListener('click', () => {
                        resultOverlay.style.display = 'none';
                        if (currentLevelIndex < levelData.length - 1) loadLevel(currentLevelIndex + 1);
                        else { showToast('🏆 恭喜！你已通关全部关卡！', 3000); loadLevel(0); }
                    });
                    if (btnRetry) btnRetry.addEventListener('click', () => { resultOverlay.style.display = 'none'; reloadCurrentLevel(); });
                    if (btnQuit) btnQuit.addEventListener('click', () => { resultOverlay.style.display = 'none'; openLevelSelect(); });
                    if (btnRevive) btnRevive.addEventListener('click', () => {
                        resultOverlay.style.display = 'none';
                        showAd('📺 观看广告获得加时', '广告结束后增加30秒继续挑战', () => {
                            timeLeft += BONUS_TIME;
                            reviveUsed = true;
                            isGameActive = true;
                            isPaused = false;
                            updateTimerDisplay();
                            timerDisplay.classList.remove('warning');
                            startTimer();
                            showToast('⏱ +30秒！继续加油！', 2000);
                        });
                    });
                }, 100);
            }

            function openLevelSelect() {
                levelSelectOverlay.style.display = 'flex';
                renderLevelGrid();
            }
            function renderLevelGrid() {
                levelGrid.innerHTML = '';
                levelData.forEach((lv, idx) => {
                    const cell = document.createElement('div');
                    cell.className = 'level-cell';
                    if (completedLevels.has(idx)) cell.classList.add('completed');
                    if (idx === currentLevelIndex && !completedLevels.has(idx)) cell.classList.add('current');
                    const isUnlocked = idx === 0 || completedLevels.has(idx-1) || completedLevels.has(idx);
                    if (!isUnlocked && idx > 0) cell.classList.add('locked');
                    cell.innerHTML = `<span class="level-num">${lv.id}</span><span class="level-char">${lv.character}</span><span class="level-stars">${'★'.repeat(lv.difficulty)}</span>`;
                    cell.addEventListener('click', () => {
                        if (cell.classList.contains('locked')) return;
                        levelSelectOverlay.style.display = 'none';
                        loadLevel(idx);
                    });
                    levelGrid.appendChild(cell);
                });
            }
            btnLevels.addEventListener('click', () => { if (isGameActive && !isPaused && !isLocked()) isPaused = true; openLevelSelect(); });
            btnCloseLevelSelect.addEventListener('click', () => { levelSelectOverlay.style.display = 'none'; if (isPaused && isGameActive && !isLocked()) isPaused = false; });
            levelSelectOverlay.addEventListener('click', (e) => { if (e.target === levelSelectOverlay) { levelSelectOverlay.style.display = 'none'; if (isPaused && isGameActive && !isLocked()) isPaused = false; } });
            resultOverlay.addEventListener('click', (e) => { if (e.target === resultOverlay) resultOverlay.style.display = 'none'; });

            let resizeDebounce = null;
            window.addEventListener('resize', () => { if(resizeDebounce) clearTimeout(resizeDebounce); resizeDebounce = setTimeout(redrawCanvas, 250); });
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (adOverlay.style.display === 'flex' && btnCloseAd.classList.contains('visible')) closeAd();
                    else if (levelSelectOverlay.style.display === 'flex') { levelSelectOverlay.style.display = 'none'; if (isPaused && isGameActive && !isLocked()) isPaused = false; }
                    else if (resultOverlay.style.display === 'flex') resultOverlay.style.display = 'none';
                    else if (lockOverlay.style.display === 'flex') { /* 不允许关闭锁屏 */ }
                }
            });

            function init() {
                loadProgress();
                if (currentLevelIndex >= levelData.length) currentLevelIndex = 0;
                if (currentLevelIndex < 0) currentLevelIndex = 0;
                updateScoreDisplay();
                // 注意：loadLevel 会重置 wrongAttempts 和 lockUntil，但我们需要从进度中恢复它们吗？
                // 我们希望在加载关卡时，如果该关卡之前被锁定且未过期，则恢复锁定。
                // 所以 loadLevel 不应该重置错误次数，除非是新关卡。
                // 调整：resetGameState 会重置，但 loadLevel 调用 resetGameState。
                // 解决：在 loadLevel 中，先检查是否要从进度恢复当前关卡的锁定状态。
                // 简单处理：loadLevel 之前，保存旧状态；但第一次加载时，需要根据存储的 wrongAttempts 和 lockUntil 设置。
                // 我们在 loadLevel 末尾会检查 isLocked()，如果锁定则显示遮罩。
                // 但 resetGameState 清除了 wrongAttempts 和 lockUntil，所以需要修改：loadLevel 中不要重置这两个值，而是从外部传入。
                // 重构：将 wrongAttempts 和 lockUntil 视为关卡相关状态，切换关卡时重置，但同一关卡重试或从进度加载时保留。
                // 由于 loadProgress 已经加载了 wrongAttempts 和 lockUntil，而 loadLevel 目前重置了它们。
                // 我们需要区分：是否是新关卡加载。最简单：loadLevel 接受一个参数指示是否保留错误状态。
                // 为简化，我们修改 loadLevel：在调用前保存当前关卡的错误状态，如果要加载同一关卡（重试）则保留，否则重置。
                // 但是 init 调用 loadLevel 时，我们希望恢复之前的锁定状态。
                // 所以，我们将 loadLevel 改为默认不重置 wrongAttempts/lockUntil，除非显式重置。
                // 于是，移除 resetGameState 中的 wrongAttempts=0 和 lockUntil=null，并在切换关卡时手动重置。
                // 实现：在 loadLevel 内部，判断是否为新关卡（index !== currentLevelIndex），如果是新关卡，重置错误；否则保留。
                // 这样可以处理重试和初始化。
            }

            // 重写 loadLevel 以智能处理错误状态
            function loadLevel(index, forceResetErrors = false) {
                if (index < 0 || index >= levelData.length) return;
                const isNewLevel = (index !== currentLevelIndex);
                if (isNewLevel || forceResetErrors) {
                    wrongAttempts = 0;
                    lockUntil = null;
                    hideLockOverlay();
                }
                currentLevelIndex = index;
                // 其余重置
                clearInterval(timerInterval);
                foundSet.clear();
                timeLeft = TOTAL_TIME;
                isGameActive = true;
                isPaused = false;
                hintUsedCount = 0;
                reviveUsed = false;
                updateTimerDisplay();
                timerDisplay.classList.remove('warning');
                updateScoreDisplay();
                btnHint.disabled = false;
                const level = getCurrentLevel();
                levelBadge.textContent = `第${level.id}关`;
                levelTitle.textContent = '★'.repeat(level.difficulty) + '☆'.repeat(5-level.difficulty);
                renderFoundCells();
                renderCandidateChips(buildCandidateList());
                redrawCanvas();
                startTimer();
                updateScoreDisplay();
                saveProgress();
                resultOverlay.style.display = 'none';
                levelSelectOverlay.style.display = 'none';
                adOverlay.style.display = 'none';
                if (isLocked()) {
                    showLockOverlay();
                    startLockTimer();
                }
            }

            // 重新绑定重试按钮调用 loadLevel(currentLevelIndex, true) 强制重置错误
            // 注意：showResultModal 中的重试按钮调用了 reloadCurrentLevel，我们修改 reloadCurrentLevel 实现强制重置
            function reloadCurrentLevel(resetErrors = true) {
                loadLevel(currentLevelIndex, resetErrors);
            }

            // 更新 showResultModal 中重试按钮的事件为 reloadCurrentLevel(true)
            // 在原来的 setTimeout 中修改绑定
            function showResultModal(isWin) {
                resultOverlay.style.display = 'flex';
                const level = getCurrentLevel();
                if (isWin) {
                    resultModal.innerHTML = `
                        <div class="result-icon">🎉</div>
                        <div class="result-title" style="color:#4caf50;">恭喜通关！</div>
                        <div class="result-subtitle">你成功找出了「${level.character}」中所有的隐藏字</div>
                        <div class="result-score">🪙 通关奖励 +100分 | 总分：${totalScore}</div>
                        <div class="result-buttons">
                            ${currentLevelIndex < levelData.length - 1 ? '<button class="btn-result btn-next" id="btnNextLevel">▶ 下一关</button>' : '<button class="btn-result btn-next" style="background:#gold;color:#3e2f1c;">🏆 全部通关！</button>'}
                            <button class="btn-result btn-retry" id="btnRetryLevel">🔄 重玩本关</button>
                            <button class="btn-result btn-quit" id="btnQuitResult">📂 关卡选择</button>
                        </div>`;
                } else {
                    resultModal.innerHTML = `
                        <div class="result-icon">⏰</div>
                        <div class="result-title" style="color:#e74c3c;">时间到！</div>
                        <div class="result-subtitle">「${level.character}」还剩 ${level.hiddenWords.length - foundSet.size} 个隐藏字未找到</div>
                        <div class="result-score">已找到：${foundSet.size} / ${level.hiddenWords.length}</div>
                        <div class="result-buttons">
                            ${!reviveUsed ? '<button class="btn-result btn-ad" id="btnRevive">📺 看广告加时30秒</button>' : '<span style="color:#999;font-size:0.85rem;">本关已使用过复活</span>'}
                            <button class="btn-result btn-retry" id="btnRetryLevel">🔄 重新挑战</button>
                            <button class="btn-result btn-quit" id="btnQuitResult">📂 关卡选择</button>
                        </div>`;
                }
                setTimeout(() => {
                    const btnNext = $('#btnNextLevel');
                    const btnRetry = $('#btnRetryLevel');
                    const btnQuit = $('#btnQuitResult');
                    const btnRevive = $('#btnRevive');
                    if (btnNext) btnNext.addEventListener('click', () => {
                        resultOverlay.style.display = 'none';
                        if (currentLevelIndex < levelData.length - 1) loadLevel(currentLevelIndex + 1, true);
                        else { showToast('🏆 恭喜！你已通关全部关卡！', 3000); loadLevel(0, true); }
                    });
                    if (btnRetry) btnRetry.addEventListener('click', () => {
                        resultOverlay.style.display = 'none';
                        reloadCurrentLevel(true); // 强制重置错误
                    });
                    if (btnQuit) btnQuit.addEventListener('click', () => { resultOverlay.style.display = 'none'; openLevelSelect(); });
                    if (btnRevive) btnRevive.addEventListener('click', () => {
                        resultOverlay.style.display = 'none';
                        showAd('📺 观看广告获得加时', '广告结束后增加30秒继续挑战', () => {
                            timeLeft += BONUS_TIME;
                            reviveUsed = true;
                            isGameActive = true;
                            isPaused = false;
                            updateTimerDisplay();
                            timerDisplay.classList.remove('warning');
                            startTimer();
                            showToast('⏱ +30秒！继续加油！', 2000);
                        });
                    });
                }, 100);
            }

            // 初始化
            function init() {
                loadProgress();
                if (currentLevelIndex >= levelData.length) currentLevelIndex = 0;
                if (currentLevelIndex < 0) currentLevelIndex = 0;
                updateScoreDisplay();
                // 首次加载，如果存储的 wrongAttempts/lockUntil 存在且属于当前关卡，则保留（loadLevel 不会重置因为 isNewLevel 判断）
                // 但 init 时 currentLevelIndex 可能等于存储的 index，所以 loadLevel 内部会判断 isNewLevel (false) 从而保留错误状态。
                loadLevel(currentLevelIndex);
                setTimeout(redrawCanvas, 200);
            }
            init();
            console.log('🀄 汉字拆字大师 - 游戏已就绪 (含错误惩罚锁)');
        })();
    </script>
</body>
</html>
